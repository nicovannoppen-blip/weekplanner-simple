<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AgendaPicto PRO 4.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="title">AgendaPicto PRO 4.0</div>
  <div class="top-controls">
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>

    <button onclick="previous()">←</button>
    <button onclick="next()">→</button>

    <button onclick="setView('week')">Week</button>
    <button onclick="setView('day')">Dag</button>

    <button onclick="selectAll()">Alles aan</button>
    <button onclick="deselectAll()">Alles uit</button>

    <button onclick="toggleKidMode()">Kinder-modus</button>
  </div>
</header>

<div id="filters"></div>
<div id="calendar"></div>

<script src="app.js"></script>
</body>
</html>
