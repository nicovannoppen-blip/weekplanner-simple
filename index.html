<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto PRO 3.0</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f1f3f4;
}

header {
  background: #4285F4;
  color: white;
  padding: 15px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
}

button {
  padding: 8px 14px;
  margin: 4px;
  border: none;
  background: white;
  color: #4285F4;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}

#controls {
  padding:10px;
  background:white;
}

#calendar {
  padding: 15px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.day-column {
  background: white;
  border-radius: 8px;
  display:flex;
  flex-direction:column;
}

.day-header {
  padding:10px;
  font-weight:bold;
  background:#e8eaed;
  border-radius:8px 8px 0 0;
}

.timeline {
  position: relative;
  height: 960px; /* 16 uur */
  background:
    repeating-linear-gradient(
      to bottom,
      #eee 0px,
      #eee 1px,
      transparent 1px,
      transparent 60px
    );
}

.hour-label {
  position:absolute;
  left:2px;
  font-size:10px;
  color:#888;
}

.event-block {
  position:absolute;
  color:white;
  border-radius:6px;
  padding:4px;
  font-size:12px;
  overflow:hidden;
  cursor:grab;
}

.event-header {
  display:flex;
  align-items:center;
  gap:4px;
}

.event-header img {
  width:16px;
  height:16px;
}

.kid-mode .event-block {
  font-size:16px;
}

.kid-mode .event-header img {
  width:28px;
  height:28px;
}

</style>
</head>
<body>

<header>
  <div><strong>AgendaPicto PRO 3.0</strong></div>
  <div>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <button onclick="previousWeek()">←</button>
    <button onclick="nextWeek()">→</button>
    <button onclick="toggleKidMode()">Kinder-modus</button>
  </div>
</header>

<div id="controls"></div>
<div id="calendar"></div>

<script>

const CLIENT_ID = "259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com";

let accessToken = null;
let currentMonday = null;
let allEvents = [];
let allCalendars = [];
let kidMode = false;

const START_HOUR = 6;
const END_HOUR = 22;
const PX_PER_HOUR = 60;

/* LOGIN */
function login() {
  const oauth2Endpoint = "https://accounts.google.com/o/oauth2/v2/auth";
  const params = {
    client_id: CLIENT_ID,
    redirect_uri: window.location.origin,
    response_type: "token",
    scope: "https://www.googleapis.com/auth/calendar.readonly",
  };
  window.location = oauth2Endpoint + "?" + new URLSearchParams(params);
}

function logout() {
  accessToken = null;
  location.hash="";
  location.reload();
}

function parseToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  accessToken = params.get("access_token");
  if (accessToken) {
    window.history.replaceState({}, document.title, "/");
    init();
  }
}

/* INIT */
async function init() {
  currentMonday = getMonday(new Date());
  await loadCalendars();
  renderFilters();
  await loadEvents();
  renderWeek();
}

/* DATE */
function getMonday(d) {
  const date = new Date(d);
  date.setDate(d.getDate() - (d.getDay()+6)%7);
  date.setHours(0,0,0,0);
  return date;
}

function nextWeek() {
  currentMonday.setDate(currentMonday.getDate()+7);
  loadEvents().then(renderWeek);
}

function previousWeek() {
  currentMonday.setDate(currentMonday.getDate()-7);
  loadEvents().then(renderWeek);
}

/* GOOGLE */
async function loadCalendars() {
  const res = await fetch(
    "https://www.googleapis.com/calendar/v3/users/me/calendarList",
    { headers:{Authorization:"Bearer "+accessToken}}
  );
  const data = await res.json();
  allCalendars = data.items;
}

async function loadEvents() {
  const end = new Date(currentMonday);
  end.setDate(end.getDate()+7);

  allEvents = [];

  for (const cal of allCalendars) {
    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?`+
      `timeMin=${currentMonday.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`,
      { headers:{Authorization:"Bearer "+accessToken}}
    );
    const data = await res.json();
    if (data.items) {
      data.items.forEach(e=>{
        e.calendarColor = cal.backgroundColor || "#5f6368";
        e.calendarName = cal.summary;
        allEvents.push(e);
      });
    }
  }
}

/* FILTER */
function renderFilters() {
  const c = document.getElementById("controls");
  c.innerHTML="<strong>Filter:</strong><br>";
  allCalendars.forEach(cal=>{
    const id="chk_"+cal.id.replace(/[^a-zA-Z0-9]/g,"");
    c.innerHTML+=`
      <label>
        <input type="checkbox" id="${id}" checked onchange="renderWeek()">
        ${cal.summary}
      </label>
    `;
  });
}

function getSelectedCalendars() {
  return allCalendars.filter(cal=>{
    const id="chk_"+cal.id.replace(/[^a-zA-Z0-9]/g,"");
    return document.getElementById(id)?.checked;
  }).map(c=>c.summary);
}

/* RENDER */
function renderWeek() {
  const container = document.getElementById("calendar");
  container.innerHTML="";
  const selected = getSelectedCalendars();
  const days=["Ma","Di","Wo","Do","Vr","Za","Zo"];

  for(let i=0;i<7;i++){
    const dayDate = new Date(currentMonday);
    dayDate.setDate(dayDate.getDate()+i);

    const col = document.createElement("div");
    col.className="day-column";

    const header=document.createElement("div");
    header.className="day-header";
    header.innerText=`${days[i]} ${dayDate.getDate()}/${dayDate.getMonth()+1}`;

    const timeline=document.createElement("div");
    timeline.className="timeline";

    for(let h=START_HOUR;h<=END_HOUR;h++){
      const label=document.createElement("div");
      label.className="hour-label";
      label.style.top=((h-START_HOUR)*PX_PER_HOUR)+"px";
      label.innerText=h+":00";
      timeline.appendChild(label);
    }

    const dayEvents = allEvents
      .filter(e=>selected.includes(e.calendarName))
      .filter(e=>{
        const d=new Date(e.start.dateTime||e.start.date);
        return d.toDateString()===dayDate.toDateString();
      })
      .map(e=>{
        const start=new Date(e.start.dateTime||e.start.date);
        const end=new Date(e.end?.dateTime||e.end?.date||start);
        return {...e,startDate:start,endDate:end};
      });

    layoutEvents(dayEvents,timeline);

    col.appendChild(header);
    col.appendChild(timeline);
    container.appendChild(col);
  }
}

/* OVERLAP LAYOUT */
function layoutEvents(events,timeline){
  events.sort((a,b)=>a.startDate-b.startDate);

  events.forEach((event,index)=>{
    const top=((event.startDate.getHours()-START_HOUR)*PX_PER_HOUR)
              +(event.startDate.getMinutes()/60*PX_PER_HOUR);
    const height=((event.endDate-event.startDate)/3600000)*PX_PER_HOUR;

    const block=document.createElement("div");
    block.className="event-block";
    block.style.top=top+"px";
    block.style.height=height+"px";
    block.style.background=event.calendarColor;
    block.style.left="0%";
    block.style.width="100%";

    block.innerHTML=`
      <div class="event-header">
        <img src="https://api.iconify.design/mdi/${getIcon(event)}.svg?color=white">
        <strong>${event.summary}</strong>
      </div>
    `;

    makeDraggable(block);

    timeline.appendChild(block);
  });
}

/* DRAG VISUAL ONLY */
function makeDraggable(block){
  block.draggable=true;

  block.addEventListener("dragstart",e=>{
    block.dataset.startTop=block.style.top;
  });

  block.addEventListener("dragend",e=>{
    const rect=block.parentElement.getBoundingClientRect();
    const y=e.clientY-rect.top;
    block.style.top=Math.max(0,y)+"px";
  });
}

/* ICON SYSTEM */
function getIcon(event){
  const text=(event.summary||"").toLowerCase();
  const location=(event.location||"").toLowerCase();

  if(text.includes("bus")) return "bus";
  if(text.includes("slapen")) return "sleep";
  if(text.includes("rijden")) return "car";
  if(text.includes("beugel")) return "tooth";

  if(location.includes("kapelstraat 73")) return "hospital-box";
  if(location.includes("puthofveld 4")) return "nurse";

  if(text.includes("rita oppas thuis")) return "home";
  if(text.includes("rita oppas bij haar")) return "home-heart";

  return "calendar";
}

function toggleKidMode(){
  kidMode=!kidMode;
  document.body.classList.toggle("kid-mode");
}

parseToken();

</script>
</body>
</html>
