<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Familie Agenda</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<script src="https://apis.google.com/js/api.js"></script>
<script src="app.js"></script>
</head>

<body>

<div id="loginScreen">
<h2>Familie Agenda</h2>

<input type="password" id="password" placeholder="Wachtwoord">

<label>
<input type="checkbox" id="remember">
Onthoud aanmelden
</label>

<button onclick="login()">Aanmelden</button>
</div>


<div id="agendaScreen" style="display:none">

<div class="topbar">

<button onclick="setWeek()">Week</button>
<button onclick="setDay()">Dag</button>

<button onclick="toggleBigIcons()">Grote pictogrammen</button>

</div>


<div id="filters"></div>

<div id="agendaContainer"></div>

</div>

</body>
</html>
