<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<title>Agenda Vannoppekes</title>
<link rel="stylesheet" href="style.css">
<style>
#speechOverlay{
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    border:2px solid #4285F4;
    border-radius:8px;
    padding:12px;
    z-index:1000;
    max-width:300px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    font-size:14px;
    line-height:1.4;
}
</style>
</head>

<body>

<header>
<button onclick="login()">🔐 login</button>
<button onclick="prev()">⬅ vorige</button>
<button onclick="today()">📅 vandaag</button>
<button onclick="next()">➡ volgende</button>
<button onclick="toggleView()">🗓 dag/week</button>
<button onclick="toggleIcons()">🖼 grote picto</button>
<button onclick="selectAll()">✅ alles</button>
<button onclick="selectNone()">❌ niets</button>
    
<!-- Toon en lees komende 4 agendapunten -->
<button onclick="showNextEvents()">🔊 afspraken</button>

</header>

<div id="filters"></div>
<div id="agenda"></div>

<!-- Overlay voor spraaktekst -->
<div id="speechOverlay" style="display:none;"></div>

<script src="config.js"></script>
<script src="script.js"></script>
    
<div id="popup" class="popup">
<div class="popupContent">
<div id="popupText"></div>
<button onclick="closePopup()">OK</button>
</div>
</div>
    
</body>
</html>
