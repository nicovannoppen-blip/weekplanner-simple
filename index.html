<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto</title>
  

<style>
body { font-family: Arial; margin:0; background:#f1f3f4; }
header { background:#4285F4; color:white; padding:15px; font-size:20px; }
button { padding:8px 14px; margin:5px; border:none; background:#4285F4; color:white; border-radius:4px; cursor:pointer; }
#calendar { padding:15px; }
.event { background:white; padding:10px; margin-bottom:8px; border-radius:6px; display:flex; align-items:center; gap:10px; }
.icon { width:40px; height:40px; }
</style>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<header>
AgendaPicto
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="exportPDF()">Export PDF</button>
</header>

<div id="calendar"></div>

<script>

const CLIENT_ID = "PLAATS_HIER_JOUW_CLIENT_ID";

let accessToken = null;

function login() {
  const oauth2Endpoint = "https://accounts.google.com/o/oauth2/v2/auth";

  const params = {
    client_id: CLIENT_ID,
    redirect_uri: window.location.origin,
    response_type: "token",
    scope: "https://www.googleapis.com/auth/calendar.readonly",
    include_granted_scopes: "true",
    state: "pass-through value"
  };

  const queryString = new URLSearchParams(params).toString();
  window.location = oauth2Endpoint + "?" + queryString;
}

function logout() {
  accessToken = null;
  document.getElementById("calendar").innerHTML = "";
  window.location.hash = "";
}

function parseTokenFromUrl() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  accessToken = params.get("access_token");

  if (accessToken) {
    loadCalendar();
  }
}

async function loadCalendar() {
  const response = await fetch(
    "https://www.googleapis.com/calendar/v3/calendars/primary/events",
    {
      headers: { Authorization: "Bearer " + accessToken }
    }
  );

  const data = await response.json();
  renderEvents(data.items || []);
}

function renderEvents(events) {
  const container = document.getElementById("calendar");
  container.innerHTML = "";

  events.forEach(e => {
    const div = document.createElement("div");
    div.className = "event";
    div.innerHTML = `
      <img class="icon" src="https://api.iconify.design/mdi/calendar.svg">
      <div>
        <strong>${e.summary}</strong><br>
        ${e.start?.dateTime || e.start?.date || ""}
      </div>
    `;
    container.appendChild(div);
  });
}

async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("AgendaPicto Weekoverzicht", 20, 20);

  let y = 40;
  document.querySelectorAll(".event").forEach(ev => {
    doc.text(ev.innerText, 20, y);
    y += 10;
  });

  doc.save("AgendaPicto.pdf");
}

parseTokenFromUrl();

</script>

</body>
</html>
