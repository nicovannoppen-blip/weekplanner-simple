<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Familie Agenda</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family:Arial;
margin:0;
background:#eef1f5;
}

header{
background:#4285F4;
color:white;
padding:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

button{
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

#filters{
background:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

#calendar{
padding:10px;
}

.week{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:white;
border-radius:6px;
padding:8px;
}

.dayTitle{
font-weight:bold;
margin-bottom:6px;
}

.timeline{
position:relative;
height:920px;
border-left:2px solid #ddd;
}

.hour{
position:absolute;
left:-40px;
font-size:11px;
color:#777;
}

.event{
position:absolute;
left:10px;
right:10px;
border-radius:6px;
padding:3px;
font-size:12px;
display:flex;
gap:4px;
align-items:center;
color:white;
}

.icon{
width:18px;
height:18px;
}

</style>
</head>

<body>

<header>

<b>Familie Agenda</b>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="prevWeek()">◀</button>
<button onclick="nextWeek()">▶</button>

<button onclick="setWeek()">Week</button>
<button onclick="setDay()">Dag</button>

<button onclick="selectAll()">Alles</button>
<button onclick="selectNone()">Geen</button>

</header>

<div id="filters"></div>

<div id="calendar"></div>

<script>

const CLIENT_ID="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com"

let token=null
let calendars=[]
let events=[]

let view="week"
let currentDate=new Date()

const HIDDEN=[
"Weeknummers",
"Agenda",
"Borgloon Weather",
"agenda website"
]

function login(){

const url="https://accounts.google.com/o/oauth2/v2/auth"

const params={
client_id:CLIENT_ID,
redirect_uri:window.location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

window.location=url+"?"+new URLSearchParams(params)

}

function logout(){

token=null
events=[]
document.getElementById("calendar").innerHTML=""

}

function parseToken(){

const hash=window.location.hash.substring(1)

const params=new URLSearchParams(hash)

token=params.get("access_token")

if(token) loadCalendars()

}

async function loadCalendars(){

const res=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+token}}
)

const data=await res.json()

calendars=data.items.filter(c=>!HIDDEN.includes(c.summary))

renderFilters()

loadEvents()

}

function renderFilters(){

const f=document.getElementById("filters")

f.innerHTML=""

calendars.forEach(c=>{

let name=c.summary

if(name.includes("Feestdagen"))
name="feestdagen"

f.innerHTML+=`
<label>
<input type="checkbox" checked value="${c.id}">
${name}
</label>
`

})

}

async function loadEvents(){

events=[]

for(const cal of calendars){

const res=await fetch(
`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?maxResults=2500`,
{
headers:{Authorization:"Bearer "+token}
}
)

const data=await res.json()

data.items.forEach(e=>{
events.push({...e,calendarId:cal.id,calendarName:cal.summary})
})

}

render()

}

function getSelectedCalendars(){

return [...document.querySelectorAll("#filters input:checked")]
.map(c=>c.value)

}

function getIcon(e){

const text=(e.summary||"").toLowerCase()
const loc=(e.location||"").toLowerCase()

if(text.includes("bus"))
return "https://api.iconify.design/mdi/bus.svg"

if(text.includes("slapen"))
return "https://api.iconify.design/mdi/sleep.svg"

if(text.includes("rijden"))
return "https://api.iconify.design/mdi/car.svg"

if(loc.includes("orelia puthof"))
return "https://api.iconify.design/mdi/nurse.svg"

if(text.includes("rita oppas thuis") || text.includes("oppas door loriana"))
return "https://api.iconify.design/mdi/home-heart.svg"

if(text.includes("rita oppas bij haar"))
return "https://api.iconify.design/mdi/home-export-outline.svg"

return "https://api.iconify.design/mdi/calendar.svg"

}

function render(){

if(view==="week") renderWeek()
else renderDay()

}

function renderWeek(){

const cal=document.getElementById("calendar")
cal.innerHTML=""

const start=new Date(currentDate)

start.setDate(start.getDate()-start.getDay()+1)

const week=document.createElement("div")
week.className="week"

for(let i=0;i<7;i++){

const d=new Date(start)
d.setDate(start.getDate()+i)

week.appendChild(createDay(d))

}

cal.appendChild(week)

}

function renderDay(){

const cal=document.getElementById("calendar")
cal.innerHTML=""

cal.appendChild(createDay(currentDate))

}

function createDay(date){

const selected=getSelectedCalendars()

const dayStr=date.toISOString().split("T")[0]

const div=document.createElement("div")
div.className="day"

div.innerHTML=`<div class="dayTitle">${date.toLocaleDateString()}</div>`

const timeline=document.createElement("div")
timeline.className="timeline"

for(let h=0;h<=23;h++){

const label=document.createElement("div")
label.className="hour"
label.style.top=(h*40)+"px"
label.innerText=h+":00"

timeline.appendChild(label)

}

const dayEvents=events
.filter(e=>{

if(!selected.includes(e.calendarId)) return false

const dateStr=(e.start?.dateTime||e.start?.date||"").substring(0,10)

return dateStr===dayStr

})
.sort((a,b)=>{

const ta=new Date(a.start?.dateTime||a.start?.date)
const tb=new Date(b.start?.dateTime||b.start?.date)

return ta-tb

})

dayEvents.forEach(e=>{

const start=new Date(e.start?.dateTime||e.start?.date)
const end=new Date(e.end?.dateTime||e.end?.date)

const top=start.getHours()*40+(start.getMinutes()/60*40)
const height=(end-start)/3600000*40

const ev=document.createElement("div")
ev.className="event"

ev.style.top=top+"px"
ev.style.height=height+"px"

ev.style.background=colorFromCalendar(e.calendarName)

ev.innerHTML=`
<img class="icon" src="${getIcon(e)}">
${e.summary}
`

timeline.appendChild(ev)

})

div.appendChild(timeline)

return div

}

function colorFromCalendar(name){

let hash=0

for(let i=0;i<name.length;i++)
hash=name.charCodeAt(i)+((hash<<5)-hash)

const c=(hash & 0x00FFFFFF).toString(16).toUpperCase()

return "#"+("00000".substring(0,6-c.length)+c)

}

function prevWeek(){
currentDate.setDate(currentDate.getDate()-7)
render()
}

function nextWeek(){
currentDate.setDate(currentDate.getDate()+7)
render()
}

function setWeek(){
view="week"
render()
}

function setDay(){
view="day"
render()
}

function selectAll(){

document.querySelectorAll("#filters input").forEach(c=>c.checked=true)
render()

}

function selectNone(){

document.querySelectorAll("#filters input").forEach(c=>c.checked=false)
render()

}

parseToken()

</script>

</body>
</html>
