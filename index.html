<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto PRO</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f1f3f4;
}

header {
  background: #4285F4;
  color: white;
  padding: 15px;
  font-size: 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

button {
  padding: 8px 14px;
  margin: 5px;
  border: none;
  background: white;
  color: #4285F4;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}

#calendar {
  padding: 15px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.day-column {
  background: #e8eaed;
  padding: 10px;
  border-radius: 8px;
  min-height: 300px;
}

.day-column h3 {
  margin-top: 0;
}

.event-block {
  padding: 8px;
  margin-bottom: 8px;
  border-radius: 6px;
  color: white;
  font-size: 14px;
}

.event-header {
  display:flex;
  align-items:center;
  gap:6px;
}

.event-header img {
  width:18px;
  height:18px;
}

/* PRINT A4 */
@media print {
  body {
    background: white;
  }

  header button {
    display:none;
  }

  #calendar {
    grid-template-columns: repeat(7, 1fr);
  }

  .event-block {
    page-break-inside: avoid;
  }
}

</style>
</head>
<body>

<header>
  <div><strong>AgendaPicto PRO</strong></div>
  <div>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <button onclick="window.print()">Print A4</button>
  </div>
</header>

<div id="calendar"></div>

<script>

const CLIENT_ID = "259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com";
let accessToken = null;

/* LOGIN */
function login() {
  const oauth2Endpoint = "https://accounts.google.com/o/oauth2/v2/auth";

  const params = {
    client_id: CLIENT_ID,
    redirect_uri: window.location.origin,
    response_type: "token",
    scope: "https://www.googleapis.com/auth/calendar.readonly",
  };

  window.location = oauth2Endpoint + "?" + new URLSearchParams(params).toString();
}

function logout() {
  accessToken = null;
  document.getElementById("calendar").innerHTML = "";
  window.location.hash = "";
}

/* TOKEN PARSEN */
function parseTokenFromUrl() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  accessToken = params.get("access_token");

  if (accessToken) loadAllCalendars();
}

/* LAAD ALLE AGENDA'S */
async function loadAllCalendars() {

  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (today.getDay() + 6) % 7);
  monday.setHours(0,0,0,0);

  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 7);

  const calendarRes = await fetch(
    "https://www.googleapis.com/calendar/v3/users/me/calendarList",
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  const calendarData = await calendarRes.json();
  const calendars = calendarData.items;

  let allEvents = [];

  for (const cal of calendars) {
    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?` +
      `timeMin=${monday.toISOString()}&` +
      `timeMax=${sunday.toISOString()}&` +
      `singleEvents=true&orderBy=startTime`,
      { headers: { Authorization: "Bearer " + accessToken } }
    );

    const data = await res.json();

    if (data.items) {
      data.items.forEach(e => {
        e.calendarColor = cal.backgroundColor || "#5f6368";
        e.calendarName = cal.summary;
        allEvents.push(e);
      });
    }
  }

  renderWeek(allEvents, monday);
}

/* WEEK RENDER */
function renderWeek(events, monday) {

  const container = document.getElementById("calendar");
  container.innerHTML = "";

  const dayNames = ["Ma","Di","Wo","Do","Vr","Za","Zo"];
  const columns = [];

  for (let i=0;i<7;i++) {
    const col = document.createElement("div");
    col.className = "day-column";

    const date = new Date(monday);
    date.setDate(monday.getDate() + i);

    col.innerHTML = `<h3>${dayNames[i]} ${date.getDate()}/${date.getMonth()+1}</h3>`;
    container.appendChild(col);
    columns.push(col);
  }

  events.forEach(event => {
    const date = new Date(event.start.dateTime || event.start.date);
    let dayIndex = (date.getDay() + 6) % 7;

    const block = document.createElement("div");
    block.className = "event-block";
    block.style.background = event.calendarColor;

    const icon = getSmartIcon(event.summary);

    block.innerHTML = `
      <div class="event-header">
        <img src="https://api.iconify.design/mdi/${icon}.svg?color=white">
        <strong>${event.summary}</strong>
      </div>
      <small>${formatTime(date)} • ${event.calendarName}</small>
    `;

    columns[dayIndex].appendChild(block);
  });
}

/* TIJD FORMAT */
function formatTime(date) {
  if (!date.getHours()) return "Hele dag";
  return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

/* SLIMME PICTO AI */
function getSmartIcon(text) {
  const t = text.toLowerCase();

  if (t.includes("voetbal") || t.includes("sport")) return "soccer";
  if (t.includes("dokter") || t.includes("tandarts")) return "medical-bag";
  if (t.includes("school") || t.includes("les")) return "school";
  if (t.includes("verjaardag") || t.includes("feest")) return "cake-variant";
  if (t.includes("werk") || t.includes("meeting")) return "briefcase";
  if (t.includes("eten") || t.includes("restaurant")) return "silverware-fork-knife";

  return "calendar";
}

parseTokenFromUrl();

</script>

</body>
</html>
