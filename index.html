<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body { font-family: Arial; margin:0; background:#f1f3f4; }
header { background:#4285F4; color:white; padding:15px; font-size:20px; }
button { padding:8px 14px; margin:5px; border:none; background:#4285F4; color:white; border-radius:4px; cursor:pointer; }
#calendar { padding:15px; }
.event { background:white; padding:10px; margin-bottom:8px; border-radius:6px; display:flex; align-items:center; gap:10px; }
.icon { width:40px; height:40px; }
</style>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<header>
AgendaPicto KUST ZE
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="exportPDF()">Export PDF</button>
</header>

<div id="calendar"></div>

<script>

const CLIENT_ID = "259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com";
let accessToken = null;

function login() {
  const oauth2Endpoint = "https://accounts.google.com/o/oauth2/v2/auth";

  const params = {
    client_id: CLIENT_ID,
    redirect_uri: window.location.origin,
    response_type: "token",
    scope: "https://www.googleapis.com/auth/calendar.readonly",
  };

  window.location = oauth2Endpoint + "?" + new URLSearchParams(params).toString();
}

function logout() {
  accessToken = null;
  document.getElementById("calendar").innerHTML = "";
  window.location.hash = "";
}

function parseTokenFromUrl() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  accessToken = params.get("access_token");
  if (accessToken) loadCalendar();
}

async function loadCalendar() {
  const today = new Date();
  const firstDay = new Date(today);
  firstDay.setDate(today.getDate() - (today.getDay() + 6) % 7);
  firstDay.setHours(0,0,0,0);

  const lastDay = new Date(firstDay);
  lastDay.setDate(firstDay.getDate() + 7);

  const response = await fetch(
    `https://www.googleapis.com/calendar/v3/calendars/primary/events?` +
    `timeMin=${firstDay.toISOString()}&` +
    `timeMax=${lastDay.toISOString()}&` +
    `singleEvents=true&orderBy=startTime`,
    { headers: { Authorization: "Bearer " + accessToken } }
  );

  const data = await response.json();
  renderWeek(data.items || []);
}

function renderWeek(events) {
  const container = document.getElementById("calendar");
  container.innerHTML = "";

  container.style.display = "grid";
  container.style.gridTemplateColumns = "repeat(7, 1fr)";
  container.style.gap = "10px";

  const days = ["Ma","Di","Wo","Do","Vr","Za","Zo"];
  const columns = [];

  for (let i=0;i<7;i++) {
    const col = document.createElement("div");
    col.innerHTML = `<h3>${days[i]}</h3>`;
    col.style.background = "#e8eaed";
    col.style.padding = "10px";
    col.style.borderRadius = "8px";
    container.appendChild(col);
    columns.push(col);
  }

  events.forEach(event => {
    const date = new Date(event.start.dateTime || event.start.date);
    let dayIndex = (date.getDay() + 6) % 7;

    const category = detectCategory(event.summary);
    const color = getCategoryColor(category);
    const icon = getCategoryIcon(category);

    const block = document.createElement("div");
    block.style.background = color;
    block.style.padding = "8px";
    block.style.marginBottom = "8px";
    block.style.borderRadius = "6px";
    block.style.color = "white";
    block.style.fontSize = "14px";

    block.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;">
        <img src="https://api.iconify.design/mdi/${icon}.svg?color=white" width="20">
        <strong>${event.summary}</strong>
      </div>
      <small>${formatTime(date)}</small>
    `;

    columns[dayIndex].appendChild(block);
  });
}

function formatTime(date) {
  return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

const AI_CATEGORIES = {
  school: ["school","les","toets","examen","huiswerk"],
  sport: ["voetbal","training","wedstrijd","sport"],
  dokter: ["dokter","tandarts","ziekenhuis"],
  werk: ["werk","meeting","vergadering","shift"],
  verjaardag: ["verjaardag","feest"],
};

function detectCategory(text) {
  const lower = text.toLowerCase();
  for (const cat in AI_CATEGORIES) {
    if (AI_CATEGORIES[cat].some(word => lower.includes(word))) {
      return cat;
    }
  }
  return "algemeen";
}

function getCategoryColor(cat) {
  const colors = {
    school: "#fbbc05",
    sport: "#34a853",
    dokter: "#ea4335",
    werk: "#4285f4",
    verjaardag: "#9c27b0",
    algemeen: "#5f6368"
  };
  return colors[cat] || colors.algemeen;
}

function getCategoryIcon(cat) {
  const icons = {
    school: "school",
    sport: "soccer",
    dokter: "medical-bag",
    werk: "briefcase",
    verjaardag: "cake-variant",
    algemeen: "calendar"
  };
  return icons[cat] || "calendar";
}

parseTokenFromUrl();

</script>
</body>
</html>
