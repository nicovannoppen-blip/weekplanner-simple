<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>AgendaPicto PRO Y</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

header{
background:#4285F4;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:white;
cursor:pointer;
}

#filters{
background:white;
padding:10px;
display:flex;
gap:15px;
flex-wrap:wrap;
border-bottom:1px solid #ddd;
}

.week{
display:flex;
height:960px;
}

.day{
flex:1;
background:white;
margin:4px;
border-radius:8px;
position:relative;
overflow:hidden;
}

.dayHeader{
text-align:center;
font-weight:bold;
padding:6px;
border-bottom:1px solid #ddd;
background:#fafafa;
}

.hour{
position:absolute;
left:0;
right:0;
border-top:1px solid #eee;
font-size:10px;
color:#888;
}

.event{
position:absolute;
border-radius:6px;
color:white;
padding:4px;
font-size:12px;
display:flex;
gap:6px;
align-items:center;
cursor:move;
overflow:hidden;
}

.icon{
font-size:16px;
}

.large .icon{
font-size:34px;
display:block;
}

.large .event{
flex-direction:column;
text-align:center;
}

.dayView{
width:80%;
margin:auto;
}

</style>
</head>

<body>

<header>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="prevWeek()">◀ week</button>
<button onclick="today()">vandaag</button>
<button onclick="nextWeek()">week ▶</button>

<button onclick="toggleDayView()">dag / week</button>

<button onclick="toggleIcons()">grote picto</button>

<button onclick="selectAll()">alles aan</button>
<button onclick="selectNone()">alles uit</button>

<button onclick="window.print()">print / pdf</button>

</header>

<div id="filters"></div>
<div id="agenda"></div>

<script>

const CLIENT_ID="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com"

let token=null
let calendars=[]
let events=[]
let currentMonday=getMonday(new Date())

let bigIcons=false
let dayView=false

const HIDDEN=[
"Weeknummers",
"Agenda",
"Borgloon Weather",
"agenda website"
]

function login(){

const url="https://accounts.google.com/o/oauth2/v2/auth"

const params={
client_id:CLIENT_ID,
redirect_uri:window.location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

window.location=url+"?"+new URLSearchParams(params)

}

function logout(){
token=null
events=[]
render()
}

function parseToken(){

const hash=location.hash.substring(1)
const params=new URLSearchParams(hash)

token=params.get("access_token")

if(token) init()

}

async function init(){

await loadCalendars()
await loadEvents()
render()

}

async function loadCalendars(){

let r=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+token}}
)

let data=await r.json()

calendars=data.items.filter(c=>!HIDDEN.includes(c.summary))

buildFilters()

}

function buildFilters(){

let f=document.getElementById("filters")
f.innerHTML=""

calendars.forEach(c=>{

let label=document.createElement("label")

label.innerHTML=
`<input type="checkbox" checked value="${c.id}"> ${rename(c.summary)}`

label.querySelector("input").addEventListener("change",render)

f.appendChild(label)

})

}

function rename(n){

if(n.includes("Belgie Feestdagen")) return "feestdagen"
return n

}

async function loadEvents(){

events=[]

let start=new Date(currentMonday)
start.setHours(0,0,0)

let end=new Date(currentMonday)
end.setDate(end.getDate()+7)

for(let cal of calendars){

let url=
`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?`+
`timeMin=${start.toISOString()}&`+
`timeMax=${end.toISOString()}&`+
`singleEvents=true&`+
`orderBy=startTime&`+
`maxResults=2500`

let r=await fetch(url,{
headers:{Authorization:"Bearer "+token}
})

let data=await r.json()

data.items.forEach(e=>{

if(!e.start?.dateTime) return

events.push({

title:e.summary,
start:new Date(e.start.dateTime),
end:new Date(e.end.dateTime),
color:cal.backgroundColor||"#4285F4",
calendar:cal.id,
location:e.location||""

})

})

}

}

function activeCalendars(){

let list=[]

document.querySelectorAll("#filters input:checked")
.forEach(cb=>list.push(cb.value))

return list

}

function render(){

let agenda=document.getElementById("agenda")
agenda.innerHTML=""

let active=activeCalendars()

let days=dayView?1:7

let week=document.createElement("div")
week.className="week"

if(dayView) week.classList.add("dayView")

for(let i=0;i<days;i++){

let d=new Date(currentMonday)
d.setDate(d.getDate()+i)

let col=document.createElement("div")
col.className="day"

let head=document.createElement("div")
head.className="dayHeader"

head.innerText=
d.toLocaleDateString("nl-BE",{weekday:"long"})+
" "+
d.toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit"})

col.appendChild(head)

for(let h=7;h<=23;h++){

let line=document.createElement("div")
line.className="hour"
line.style.top=((h-7)*60)+"px"
line.innerText=h+":00"

col.appendChild(line)

}

let dayEvents=events
.filter(e=>active.includes(e.calendar))
.filter(e=>sameDay(e.start,d))
.sort((a,b)=>a.start-b.start)

layoutEvents(dayEvents)

dayEvents.forEach(e=>{

let start=(e.start.getHours()-7)*60+e.start.getMinutes()
let dur=(e.end-e.start)/60000

let div=document.createElement("div")
div.className="event"

div.style.top=start+"px"
div.style.height=dur+"px"
div.style.background=e.color

let width=88/e.cols
let left=6+(e.col*width)

div.style.width=width+"%"
div.style.left=left+"%"

div.draggable=true

div.innerHTML=
`<div class="icon">${icon(e)}</div>
<div>${time(e.start)} ${e.title}</div>`

col.appendChild(div)

})

week.appendChild(col)

}

agenda.appendChild(week)

if(bigIcons) agenda.classList.add("large")
else agenda.classList.remove("large")

}

function layoutEvents(ev){

for(let i=0;i<ev.length;i++){

ev[i].col=0
ev[i].cols=1

for(let j=0;j<i;j++){

if(overlap(ev[i],ev[j])){

ev[i].col=ev[j].col+1
ev[i].cols=Math.max(ev[i].cols,ev[i].col+1)
ev[j].cols=ev[i].cols

}

}

}

}

function overlap(a,b){

return a.start<b.end && b.start<a.end

}

function icon(e){

let t=e.title.toLowerCase()
let l=e.location.toLowerCase()

if(l.includes("orelia")) return "👩‍⚕️"
if(l.includes("kapelstraat")) return "⛑"
if(t.includes("bus")) return "🚌"
if(t.includes("school")) return "🎒"
if(t.includes("zwem")) return "🏊"
if(t.includes("dokter")) return "🏥"
if(t.includes("beugel")) return "🦷"
if(t.includes("slapen")) return "😴"
if(t.includes("rijden")) return "🚗"
if(t.includes("winkel")) return "🛒"
if(t.includes("oppas")) return "👵"

return "📌"

}

function sameDay(a,b){

return a.getFullYear()==b.getFullYear() &&
a.getMonth()==b.getMonth() &&
a.getDate()==b.getDate()

}

function time(d){

return d.getHours().toString().padStart(2,"0")+":"+
d.getMinutes().toString().padStart(2,"0")

}

function getMonday(d){

d=new Date(d)

let day=d.getDay()
let diff=d.getDate()-day+(day==0?-6:1)

return new Date(d.setDate(diff))

}

function prevWeek(){

currentMonday.setDate(currentMonday.getDate()-7)
init()

}

function nextWeek(){

currentMonday.setDate(currentMonday.getDate()+7)
init()

}

function today(){

currentMonday=getMonday(new Date())
init()

}

function toggleIcons(){

bigIcons=!bigIcons
render()

}

function toggleDayView(){

dayView=!dayView
render()

}

function selectAll(){

document.querySelectorAll("#filters input")
.forEach(c=>c.checked=true)

render()

}

function selectNone(){

document.querySelectorAll("#filters input")
.forEach(c=>c.checked=false)

render()

}

parseToken()

</script>

</body>
</html>
