<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Weekplanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    header {
      background: #2d6cdf;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      padding: 20px;
      border-radius: 15px;
      color: white;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      min-height: 150px;
    }

    button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
    }

    .login-screen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    @media print {
      button {
        display: none !important;
      }
      body {
        background: white;
      }
    }
  </style>
</head>

<body>

<div id="app"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxhqddHdXDEWw3SfDnYKOeKW9_ejse1_c",
  authDomain: "weekplanner-pro-b16d8.firebaseapp.com",
  projectId: "weekplanner-pro-b16d8",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

provider.addScope("https://www.googleapis.com/auth/calendar.readonly");

const appDiv = document.getElementById("app");

let accessToken = null;

appDiv.innerHTML = `
  <div style="text-align:center;margin-top:100px;">
    <h1>Weekplanner</h1>
    <button id="loginBtn">Inloggen met Google</button>
  </div>
`;

document.getElementById("loginBtn").onclick = async () => {
  const result = await signInWithPopup(auth, provider);
  const credential = GoogleAuthProvider.credentialFromResult(result);
  accessToken = credential.accessToken;

  loadCalendars(result.user.displayName);
};

async function loadCalendars(name) {
  const res = await fetch(
    "https://www.googleapis.com/calendar/v3/users/me/calendarList",
    {
      headers: {
        Authorization: "Bearer " + accessToken,
      },
    }
  );

  const data = await res.json();
  renderCalendars(name, data.items);
}

async function loadEvents(calendarId) {
  const today = new Date().toISOString();

  const res = await fetch(
    `https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events?timeMin=${today}&singleEvents=true&orderBy=startTime`,
    {
      headers: {
        Authorization: "Bearer " + accessToken,
      },
    }
  );

  return await res.json();
}

function getIcon(text) {
  text = text.toLowerCase();
  if (text.includes("school")) return "🏫";
  if (text.includes("voetbal")) return "⚽";
  if (text.includes("dokter")) return "🩺";
  if (text.includes("feest")) return "🎉";
  return "📌";
}

async function renderCalendars(name, calendars) {
  appDiv.innerHTML = `
    <h2 style="text-align:center;">Welkom ${name}</h2>
    <div id="container" style="display:flex;flex-wrap:wrap;gap:20px;justify-content:center;"></div>
  `;

  const container = document.getElementById("container");

  for (let cal of calendars) {
    const eventsData = await loadEvents(cal.id);

    const card = document.createElement("div");
    card.style.background = "#f2f2f2";
    card.style.padding = "20px";
    card.style.width = "250px";
    card.style.borderRadius = "10px";

    let html = `<h3>${cal.summary}</h3>`;

    if (!eventsData.items || eventsData.items.length === 0) {
      html += "<p>Geen komende activiteiten</p>";
    } else {
      eventsData.items.forEach(e => {
        html += `<div>${getIcon(e.summary)} ${e.summary}</div>`;
      });
    }

    card.innerHTML = html;
    container.appendChild(card);
  }
}
</script>

  
</body>
</html>
