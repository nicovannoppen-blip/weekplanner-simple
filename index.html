<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto</title>

<style>
body { font-family: Arial; margin:0; background:#f1f3f4;}
header { background:#4285F4; color:white; padding:15px;}
button { padding:8px 14px; margin:5px; border:none; background:#4285F4; color:white; border-radius:4px; cursor:pointer;}
#calendar { padding:15px;}
</style>
</head>

<body>

<header>
AgendaPicto
<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<span id="userInfo"></span>
</header>

<div id="calendar"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxhqddHdXDEWw3SfDnYKOeKW9_ejse1_c",
  authDomain: "weekplanner-pro-b16d8.firebaseapp.com",
  projectId: "weekplanner-pro-b16d8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
provider.addScope("https://www.googleapis.com/auth/calendar.readonly");

document.getElementById("loginBtn").addEventListener("click", () => {
  signInWithRedirect(auth, provider);
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  signOut(auth);
});

getRedirectResult(auth).catch(error => {
  console.error(error);
});

onAuthStateChanged(auth, async (user) => {
  if (user) {
    document.getElementById("userInfo").innerText =
      "Welkom " + user.displayName;

    const token = await user.getIdToken();
    loadCalendar(token);
  } else {
    document.getElementById("userInfo").innerText = "";
    document.getElementById("calendar").innerHTML = "";
  }
});

async function loadCalendar(token) {
  const res = await fetch(
    "https://www.googleapis.com/calendar/v3/calendars/primary/events",
    { headers: { Authorization: "Bearer " + token } }
  );

  const data = await res.json();
  renderEvents(data.items || []);
}

function renderEvents(events) {
  const container = document.getElementById("calendar");
  container.innerHTML = "";

  events.forEach(e => {
    const div = document.createElement("div");
    div.style.background = "white";
    div.style.padding = "10px";
    div.style.marginBottom = "8px";
    div.style.borderRadius = "6px";

    div.innerHTML = `
      <strong>${e.summary}</strong><br>
      ${e.start?.dateTime || e.start?.date}
    `;
    container.appendChild(div);
  });
}

</script>

</body>
</html>
