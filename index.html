<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f3f4;
}

header{
background:#4285F4;
color:white;
padding:15px;
display:flex;
flex-wrap:wrap;
gap:6px;
align-items:center;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

#controls{
background:white;
padding:10px;
}

#calendar{
padding:10px;
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:white;
border-radius:6px;
padding:8px;
min-height:200px;
}

.day h3{
margin-top:0;
}

.event{
border-radius:6px;
padding:6px;
margin-bottom:6px;
color:white;
font-size:13px;
display:flex;
align-items:center;
gap:6px;
}

.event img{
width:18px;
height:18px;
}

.kid .event{
font-size:18px;
padding:12px;
}

.kid .event img{
width:40px;
height:40px;
}

@media print{
header,#controls{
display:none;
}
body{
background:white;
}
}

</style>
</head>

<body>

<header>

<b>AgendaPicto</b>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="previousWeek()">←</button>
<button onclick="nextWeek()">→</button>

<button onclick="setWeek()">Week</button>
<button onclick="setDay()">Dag</button>

<button onclick="toggleKid()">Kinder modus</button>

<button onclick="selectAll()">Alles aan</button>
<button onclick="deselectAll()">Alles uit</button>

<button onclick="window.print()">Print</button>
<button onclick="savePDF()">PDF</button>

</header>

<div id="controls"></div>

<div id="calendar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const CLIENT_ID="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com";

let accessToken=null
let calendars=[]
let events=[]
let monday=null
let view="week"

function login(){

const oauth="https://accounts.google.com/o/oauth2/v2/auth"

const params={
client_id:CLIENT_ID,
redirect_uri:window.location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

window.location=oauth+"?"+new URLSearchParams(params)

}

function logout(){

accessToken=null
location.hash=""
location.reload()

}

function parseToken(){

const hash=window.location.hash.substring(1)
const params=new URLSearchParams(hash)

accessToken=params.get("access_token")

if(accessToken) init()

}

async function init(){

monday=getMonday(new Date())

await loadCalendars()

renderFilters()

await loadEvents()

render()

}

function getMonday(d){

d=new Date(d)

d.setDate(d.getDate()-(d.getDay()+6)%7)

d.setHours(0,0,0,0)

return d

}

function nextWeek(){

monday.setDate(monday.getDate()+7)

loadEvents().then(render)

}

function previousWeek(){

monday.setDate(monday.getDate()-7)

loadEvents().then(render)

}

function setWeek(){

view="week"

render()

}

function setDay(){

view="day"

render()

}

async function loadCalendars(){

const r=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+accessToken}}
)

const data=await r.json()

calendars=data.items

}

async function loadEvents(){

events=[]

let end=new Date(monday)

end.setDate(monday.getDate()+7)

for(const cal of calendars){

const r=await fetch(

`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${monday.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`,

{headers:{Authorization:"Bearer "+accessToken}}

)

const data=await r.json()

if(data.items){

data.items.forEach(e=>{

e.calendar=cal.summary
e.color=cal.backgroundColor||"#5f6368"

events.push(e)

})

}

}

}

function renderFilters(){

const c=document.getElementById("controls")

c.innerHTML="<b>Agenda filters</b><br>"

calendars.forEach(cal=>{

const id="f"+cal.id.replace(/[^a-z0-9]/gi,"")

c.innerHTML+=`

<label>
<input type="checkbox" id="${id}" checked onchange="render()">
${cal.summary}
</label>

`

})

}

function selectedCalendars(){

return calendars.filter(cal=>{

const id="f"+cal.id.replace(/[^a-z0-9]/gi,"")

return document.getElementById(id)?.checked

}).map(c=>c.summary)

}

function selectAll(){

document.querySelectorAll("#controls input").forEach(i=>i.checked=true)

render()

}

function deselectAll(){

document.querySelectorAll("#controls input").forEach(i=>i.checked=false)

render()

}

function render(){

const cal=document.getElementById("calendar")

cal.innerHTML=""

if(view==="week"){

cal.style.gridTemplateColumns="repeat(7,1fr)"

}else{

cal.style.gridTemplateColumns="1fr"

}

const days=["Ma","Di","Wo","Do","Vr","Za","Zo"]

const cols=[]

const count=view==="week"?7:1

for(let i=0;i<count;i++){

let d=new Date(monday)

d.setDate(monday.getDate()+i)

const col=document.createElement("div")

col.className="day"

col.innerHTML=`<h3>${days[i]} ${d.getDate()}/${d.getMonth()+1}</h3>`

cal.appendChild(col)

cols.push(col)

}

const selected=selectedCalendars()

events
.filter(e=>selected.includes(e.calendar))
.sort((a,b)=>new Date(a.start.dateTime||a.start.date)-new Date(b.start.dateTime||b.start.date))
.forEach(e=>{

const date=new Date(e.start.dateTime||e.start.date)

const index=(date.getDay()+6)%7

if(view==="day" && index!==0) return

const div=document.createElement("div")

div.className="event"

div.style.background=e.color

const icon=getIcon(e)

div.innerHTML=`

<img src="https://api.iconify.design/mdi/${icon}.svg?color=white">
<div>
<b>${e.summary}</b><br>
${formatTime(date)} • ${e.calendar}
</div>

`

cols[index].appendChild(div)

})

}

function formatTime(d){

if(!d.getHours()) return "Hele dag"

return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})

}

function getIcon(e){

const t=(e.summary||"").toLowerCase()

const l=(e.location||"").toLowerCase()

if(t.includes("bus")) return "bus"

if(t.includes("slapen")) return "sleep"

if(t.includes("rijden")) return "car"

if(t.includes("voetbal")) return "soccer"

if(t.includes("zwem")) return "swim"

if(t.includes("verjaardag")) return "cake"

if(t.includes("school")) return "school"

if(t.includes("eten")) return "silverware"

if(t.includes("dokter")) return "medical-bag"

if(t.includes("beugel")) return "tooth"

if(t.includes("oppas")) return "home-heart"

if(l.includes("kapelstraat 73")) return "plus-circle"

if(l.includes("puthofveld")) return "nurse"

return "calendar"

}

function toggleKid(){

document.body.classList.toggle("kid")

}

async function savePDF(){

const {jsPDF}=window.jspdf

const doc=new jsPDF("landscape")

doc.text("AgendaPicto",10,10)

let y=20

document.querySelectorAll(".day").forEach(d=>{

doc.text(d.innerText,10,y)

y+=10

})

doc.save("agenda.pdf")

}

parseToken()

</script>

</body>
</html>
