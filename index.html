<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Familie Agenda PRO F</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f3f4;
}

header{
background:#4285F4;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
align-items:center;
}

button{
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

#filters{
background:white;
padding:8px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
height:920px;
}

.day{
background:#fafafa;
border-right:1px solid #ddd;
position:relative;
}

.dayHeader{
background:#e8eaed;
padding:6px;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.timeline{
position:absolute;
top:30px;
bottom:0;
left:0;
right:0;
}

.hour{
position:absolute;
left:0;
right:0;
border-top:1px solid #ddd;
font-size:10px;
color:#777;
}

.event{
position:absolute;
border-radius:6px;
color:white;
font-size:12px;
padding:4px;
overflow:hidden;
cursor:move;
}

.icon{
width:16px;
vertical-align:middle;
margin-right:4px;
}

/* GROTE PICTO MODUS */

.big .icon{
width:40px;
display:block;
margin:auto;
}

.big .event{
font-size:11px;
text-align:center;
}

/* DAGWEERGAVE */

.dayView #calendar{
grid-template-columns:1fr;
}

/* PRINT */

@media print{
header,#filters{
display:none;
}

}

</style>
</head>

<body>

<header>

<b>Familie Agenda</b>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="prevWeek()">◀</button>
<button onclick="nextWeek()">▶</button>

<button onclick="toggleDayView()">Dag</button>

<button onclick="selectAll()">Alles</button>
<button onclick="selectNone()">Geen</button>

<button onclick="toggleBig()">Grote pictos</button>

<button onclick="window.print()">Print</button>

</header>

<div id="filters"></div>
<div id="calendar"></div>

<script>

const CLIENT_ID="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com"

const START=7
const END=23

let token=null
let calendars=[]
let events=[]
let monday=null

const HIDDEN=[
"Weeknummers",
"Agenda",
"Borgloon Weather",
"agenda website"
]

/* LOGIN */

function login(){

const params={
client_id:CLIENT_ID,
redirect_uri:location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

location="https://accounts.google.com/o/oauth2/v2/auth?"+new URLSearchParams(params)

}

function logout(){

localStorage.removeItem("agenda_token")
location.reload()

}

function parseToken(){

const hash=location.hash.substring(1)
const p=new URLSearchParams(hash)

const urlToken=p.get("access_token")

if(urlToken){
token=urlToken
localStorage.setItem("agenda_token",token)
}else{
token=localStorage.getItem("agenda_token")
}

if(token)init()

}

/* INIT */

async function init(){

monday=getMonday(new Date())

await loadCalendars()

renderFilters()

await loadEvents()

render()

}

/* LOAD CALENDARS */

async function loadCalendars(){

const res=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+token}}
)

const data=await res.json()

calendars=data.items.filter(c=>!HIDDEN.includes(c.summary))

calendars.forEach(c=>{
if(c.summary.includes("Feestdagen"))
c.summary="feestdagen"
})

}

/* LOAD EVENTS */

async function loadEvents(){

events=[]

let end=new Date(monday)
end.setDate(end.getDate()+7)

for(const cal of calendars){

const res=await fetch(
`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${monday.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`,
{headers:{Authorization:"Bearer "+token}}
)

const data=await res.json()

if(data.items){

data.items.forEach(e=>{
e.calendar=cal.summary
e.color=cal.backgroundColor||"#666"
events.push(e)
})

}

}

}

/* FILTERS */

function renderFilters(){

const div=document.getElementById("filters")
div.innerHTML=""

calendars.forEach(c=>{

const id="f_"+c.id.replace(/\W/g,"")

div.innerHTML+=`
<label>
<input type="checkbox" checked id="${id}" onchange="render()">
${c.summary}
</label>
`

})

}

function selected(){

return calendars.filter(c=>{
const id="f_"+c.id.replace(/\W/g,"")
return document.getElementById(id)?.checked
}).map(c=>c.summary)

}

function selectAll(){
document.querySelectorAll("#filters input").forEach(i=>i.checked=true)
render()
}

function selectNone(){
document.querySelectorAll("#filters input").forEach(i=>i.checked=false)
render()
}

/* NAVIGATIE */

function nextWeek(){
monday.setDate(monday.getDate()+7)
loadEvents().then(render)
}

function prevWeek(){
monday.setDate(monday.getDate()-7)
loadEvents().then(render)
}

/* RENDER */

function render(){

const cal=document.getElementById("calendar")
cal.innerHTML=""

const days=["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"]

for(let i=0;i<7;i++){

let d=new Date(monday)
d.setDate(monday.getDate()+i)

const day=document.createElement("div")
day.className="day"

day.innerHTML=`
<div class="dayHeader">${days[d.getDay()]} ${pad(d.getDate())}/${pad(d.getMonth()+1)}</div>
<div class="timeline"></div>
`

cal.appendChild(day)

drawHours(day)

drawEvents(day,d)

}

}

/* HOURS */

function drawHours(day){

const timeline=day.querySelector(".timeline")

for(let h=START;h<=END;h++){

const pos=(h-START)/(END-START)*100

const line=document.createElement("div")
line.className="hour"
line.style.top=pos+"%"
line.innerText=h+":00"

timeline.appendChild(line)

}

}

/* EVENTS */

function drawEvents(day,date){

const timeline=day.querySelector(".timeline")

const sel=selected()

const dayEvents=events
.filter(e=>sel.includes(e.calendar))
.filter(e=>{
const d=new Date(e.start.dateTime||e.start.date)
return d.toDateString()==date.toDateString()
})
.sort((a,b)=>new Date(a.start.dateTime||a.start.date)-new Date(b.start.dateTime||b.start.date))

let columns=[]

dayEvents.forEach(e=>{

const start=new Date(e.start.dateTime||e.start.date)
const end=new Date(e.end?.dateTime||e.end?.date||start)

const startMin=start.getHours()*60+start.getMinutes()
const endMin=end.getHours()*60+end.getMinutes()

const top=(startMin-START*60)/((END-START)*60)*100
const height=(endMin-startMin)/((END-START)*60)*100

let col=0
while(columns[col] && columns[col]>startMin) col++
columns[col]=endMin

const width=90/(col+1)
const left=5+col*width

const div=document.createElement("div")

div.className="event"
div.style.background=e.color
div.style.top=top+"%"
div.style.height=height+"%"
div.style.left=left+"%"
div.style.width=width+"%"

div.draggable=true

div.innerHTML=`
<img class="icon" src="${getIcon(e)}">
${e.summary}
`

enableDrag(div)

timeline.appendChild(div)

})

}

/* DRAG */

function enableDrag(el){

el.addEventListener("dragend",e=>{
el.style.top=e.pageY-200+"px"
})

}

/* ICON AI */

function getIcon(e){

const t=(e.summary||"").toLowerCase()
const loc=(e.location||"").toLowerCase()

if(t.includes("bus")) return "https://api.iconify.design/mdi/bus.svg"
if(t.includes("slapen")) return "https://api.iconify.design/mdi/sleep.svg"
if(t.includes("rijden")) return "https://api.iconify.design/mdi/car.svg"
if(t.includes("beugel")) return "https://api.iconify.design/mdi/tooth-outline.svg"

if(t.includes("rita oppas thuis")||t.includes("oppas door loriana"))
return "https://api.iconify.design/mdi/home-heart.svg"

if(t.includes("rita oppas bij haar"))
return "https://api.iconify.design/mdi/home-export-outline.svg"

if(loc.includes("orelia puthof"))
return "https://api.iconify.design/mdi/nurse.svg"

if(t.includes("voetbal")) return "https://api.iconify.design/mdi/soccer.svg"
if(t.includes("zwem")) return "https://api.iconify.design/mdi/swim.svg"
if(t.includes("school")) return "https://api.iconify.design/mdi/school.svg"

return "https://api.iconify.design/mdi/calendar.svg"

}

/* UI */

function toggleBig(){
document.body.classList.toggle("big")
}

function toggleDayView(){
document.body.classList.toggle("dayView")
}

/* DATE */

function getMonday(d){

const date=new Date(d)
const day=date.getDay()||7

if(day!==1)
date.setHours(-24*(day-1))

return date

}

function pad(n){
return n<10?"0"+n:n
}

parseToken()

</script>

</body>
</html>
