<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<title>AgendaPicto PRO AI</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#4285F4;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:white;
cursor:pointer;
}

#filters{
background:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:14px;
border-bottom:1px solid #ddd;
}

.week{
display:flex;
height:960px;
}

.day{
flex:1;
background:white;
margin:4px;
border-radius:8px;
position:relative;
}

.dayHeader{
text-align:center;
font-weight:bold;
padding:6px;
border-bottom:1px solid #ddd;
}

.hour{
position:absolute;
left:0;
right:0;
border-top:1px solid #eee;
font-size:10px;
color:#888;
}

.event{
position:absolute;
border-radius:6px;
color:white;
padding:4px;
font-size:12px;
display:flex;
gap:6px;
align-items:center;
overflow:hidden;
}

.picto{
width:26px;
height:26px;
}

.large .picto{
width:60px;
height:60px;
}

.large .event{
flex-direction:column;
text-align:center;
}

</style>

</head>

<body>

<header>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="prev()">◀</button>
<button onclick="today()">Vandaag</button>
<button onclick="next()">▶</button>

<button onclick="toggleView()">dag/week</button>
<button onclick="toggleIcons()">grote picto</button>

<button onclick="selectAll()">alles aan</button>
<button onclick="selectNone()">alles uit</button>

</header>

<div id="filters"></div>
<div id="agenda"></div>

<script>

const CLIENT_ID="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com"

let token=null
let calendars=[]
let events=[]
let currentDate=new Date()

let bigIcons=false
let dayMode=false

const HIDDEN=[
"Weeknummers",
"Agenda",
"Borgloon Weather",
"agenda website"
]

/* SMART PICTO AI */

const ICON_AI={

school:["school","klas","les"],
bus:["bus"],
zwemmen:["zwem","zwembad"],
dokter:["dokter","arts","ziekenhuis"],
tandarts:["tandarts","beugel"],
fiets:["fiets","fietsen"],
auto:["auto","rijden"],
eten:["eten","lunch","avondeten"],
slapen:["slapen","bedtijd"],
sport:["sport","training"],
winkel:["winkel","boodschappen"],
verjaardag:["verjaardag"],
thuis:["thuis"],
oppas:["oppas","oma"],
spelen:["spelen","speeltuin"],
muziek:["muziek","piano","gitaar"],
computer:["computer","tablet"],
lezen:["lezen","boek"],
douchen:["douchen","bad"]
}

/* LOGIN */

function login(){

const url="https://accounts.google.com/o/oauth2/v2/auth"

const params={
client_id:CLIENT_ID,
redirect_uri:window.location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

window.location=url+"?"+new URLSearchParams(params)

}

function logout(){
token=null
events=[]
render()
}

function parseToken(){

const hash=location.hash.substring(1)
const params=new URLSearchParams(hash)

token=params.get("access_token")

if(token) init()

}

/* GOOGLE API */

async function init(){

await loadCalendars()
await loadEvents()
render()

}

async function loadCalendars(){

let r=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+token}}
)

let data=await r.json()

calendars=data.items.filter(c=>!HIDDEN.includes(c.summary))

buildFilters()

}

function buildFilters(){

let f=document.getElementById("filters")
f.innerHTML=""

calendars.forEach(c=>{

let label=document.createElement("label")

label.innerHTML=
`<input type="checkbox" checked value="${c.id}"> ${c.summary}`

label.querySelector("input").addEventListener("change",render)

f.appendChild(label)

})

}

/* EVENTS */

async function loadEvents(){

events=[]

let start=new Date(currentDate)
start.setDate(start.getDate()-7)

let end=new Date(currentDate)
end.setDate(end.getDate()+7)

for(let cal of calendars){

let url=
`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?`+
`timeMin=${start.toISOString()}&`+
`timeMax=${end.toISOString()}&`+
`singleEvents=true&orderBy=startTime`

let r=await fetch(url,{
headers:{Authorization:"Bearer "+token}
})

let data=await r.json()

data.items.forEach(e=>{

let s=e.start.dateTime||e.start.date
let en=e.end.dateTime||e.end.date

if(!s)return

events.push({

title:e.summary||"",
start:new Date(s),
end:new Date(en),
calendar:cal.id,
color:cal.backgroundColor,
location:e.location||""

})

})

}

}

/* FILTERS */

function activeCalendars(){

let list=[]

document
.querySelectorAll("#filters input")
.forEach(c=>{
if(c.checked)list.push(c.value)
})

return list

}

/* SMART PICTO AI */

function iconsForEvent(e){

let text=(e.title+" "+e.location).toLowerCase()

let found=[]

for(let icon in ICON_AI){

ICON_AI[icon].forEach(word=>{

if(text.includes(word)){

found.push(icon)

}

})

}

if(found.length==0){
found.push("algemeen")
}

return found

}

/* RENDER */

function render(){

let agenda=document.getElementById("agenda")
agenda.innerHTML=""

let start=getMonday(currentDate)
let days=dayMode?1:7

let container=document.createElement("div")
container.className="week"

let active=activeCalendars()

for(let i=0;i<days;i++){

let d=new Date(dayMode?currentDate:start)

if(!dayMode)d.setDate(start.getDate()+i)

let col=document.createElement("div")
col.className="day"

let head=document.createElement("div")
head.className="dayHeader"

head.innerText=d.toLocaleDateString("nl-BE",{weekday:"long",day:"2-digit",month:"2-digit"})

col.appendChild(head)

for(let h=7;h<=23;h++){

let line=document.createElement("div")
line.className="hour"
line.style.top=((h-7)*60)+"px"

col.appendChild(line)

}

let dayEvents=events.filter(e=>{

return sameDay(e.start,d) && active.includes(e.calendar)

})

layoutEvents(dayEvents,col)

container.appendChild(col)

}

agenda.appendChild(container)

if(bigIcons)agenda.classList.add("large")
else agenda.classList.remove("large")

}

/* EVENTS LAYOUT */

function layoutEvents(list,col){

list.sort((a,b)=>a.start-b.start)

list.forEach(e=>{

let start=(e.start.getHours()-7)*60+e.start.getMinutes()
let dur=(e.end-e.start)/60000

let div=document.createElement("div")
div.className="event"

div.style.top=start+"px"
div.style.height=dur+"px"
div.style.left="5%"
div.style.width="90%"
div.style.background=e.color

let icons=iconsForEvent(e)

let html=""

icons.forEach(i=>{
html+=`<img src="icons/${i}.png" class="picto">`
})

html+=`<div>${time(e.start)} ${e.title}</div>`

div.innerHTML=html

col.appendChild(div)

})

}

/* HELPERS */

function sameDay(a,b){

return a.getFullYear()==b.getFullYear() &&
a.getMonth()==b.getMonth() &&
a.getDate()==b.getDate()

}

function time(d){

return d.getHours().toString().padStart(2,"0")+":"+
d.getMinutes().toString().padStart(2,"0")

}

function getMonday(d){

d=new Date(d)

let day=d.getDay()
let diff=d.getDate()-day+(day==0?-6:1)

return new Date(d.setDate(diff))

}

/* NAVIGATION */

function prev(){
dayMode?currentDate.setDate(currentDate.getDate()-1)
:currentDate.setDate(currentDate.getDate()-7)
init()
}

function next(){
dayMode?currentDate.setDate(currentDate.getDate()+1)
:currentDate.setDate(currentDate.getDate()+7)
init()
}

function today(){
currentDate=new Date()
init()
}

function toggleIcons(){
bigIcons=!bigIcons
render()
}

function toggleView(){
dayMode=!dayMode
render()
}

function selectAll(){

document.querySelectorAll("#filters input")
.forEach(c=>c.checked=true)

render()

}

function selectNone(){

document.querySelectorAll("#filters input")
.forEach(c=>c.checked=false)

render()

}

parseToken()

</script>

</body>
</html>
