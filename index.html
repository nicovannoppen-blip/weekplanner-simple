<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Familie Agenda</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#ffffff;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:10;
}

button{
padding:8px 12px;
border:none;
background:#1976d2;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

#filters{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.dayColumn{
flex:1;
background:white;
margin:4px;
border-radius:8px;
padding:6px;
min-width:200px;
}

.dayHeader{
font-weight:bold;
text-align:center;
padding:6px;
border-bottom:1px solid #ddd;
}

.week{
display:flex;
}

.timeline{
position:relative;
}

.event{
display:flex;
align-items:center;
gap:6px;
margin:2px 0;
padding:4px;
border-radius:6px;
font-size:12px;
cursor:grab;
}

.icon{
font-size:18px;
}

.large .icon{
font-size:40px;
display:block;
text-align:center;
}

.large .event{
flex-direction:column;
font-size:11px;
}

.timeLabel{
font-size:10px;
color:#777;
}

</style>
</head>

<body>

<header>

<button onclick="prevWeek()">◀ week</button>
<button onclick="today()">vandaag</button>
<button onclick="nextWeek()">week ▶</button>

<button onclick="toggleView()">dag/week</button>

<button onclick="toggleIcons()">grote picto</button>

<button onclick="selectAll()">alles aan</button>
<button onclick="selectNone()">alles uit</button>

<button onclick="window.print()">print / pdf</button>

<div id="filters"></div>

</header>

<div id="agenda"></div>

<script>

const ICS_SOURCES = [

{
name:"Gezin",
url:"ICS_URL_GEZIJIN",
color:"#33b679"
},

{
name:"Nico",
url:"ICS_URL_NICO",
color:"#039be5"
},

{
name:"Elke",
url:"ICS_URL_ELKE",
color:"#8e24aa"
},

{
name:"Niel",
url:"ICS_URL_NIEL",
color:"#ef6c00"
},

{
name:"Rita",
url:"ICS_URL_RITA",
color:"#d81b60"
},

{
name:"feestdagen",
url:"ICS_URL_FEESTDAGEN",
color:"#795548"
}

]

const HIDDEN_CALENDARS = [
"Weeknummers",
"Agenda",
"Borgloon Weather",
"agenda website"
]

let events=[]
let currentWeekStart=getMonday(new Date())
let dayMode=false
let bigIcons=false

function getMonday(d){

d=new Date(d)

let day=d.getDay()

let diff=d.getDate()-day+(day==0?-6:1)

return new Date(d.setDate(diff))

}

function formatDate(d){

return d.toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit"})

}

function formatDay(d){

return d.toLocaleDateString("nl-BE",{weekday:"long"})

}

function parseICS(text,color,source){

let lines=text.split("\n")

let e=null

lines.forEach(l=>{

if(l.startsWith("BEGIN:VEVENT")) e={}

if(l.startsWith("SUMMARY")) e.title=l.split(":")[1]

if(l.startsWith("DTSTART")){

let t=l.split(":")[1]

e.start=new Date(
t.substring(0,4),
t.substring(4,6)-1,
t.substring(6,8),
t.substring(9,11)||0,
t.substring(11,13)||0
)

}

if(l.startsWith("LOCATION")) e.location=l.split(":")[1]

if(l.startsWith("END:VEVENT")){

e.color=color
e.source=source

if(!HIDDEN_CALENDARS.includes(source))
events.push(e)

}

})

}

async function load(){

events=[]

for(let c of ICS_SOURCES){

let r=await fetch(c.url)

let t=await r.text()

parseICS(t,c.color,c.name)

}

render()

}

function render(){

let agenda=document.getElementById("agenda")

agenda.innerHTML=""

let week=document.createElement("div")

week.className="week"

let days=dayMode?1:7

for(let i=0;i<days;i++){

let date=new Date(currentWeekStart)

date.setDate(date.getDate()+i)

let col=document.createElement("div")
col.className="dayColumn"

let header=document.createElement("div")
header.className="dayHeader"
header.innerText=formatDay(date)+" "+formatDate(date)

col.appendChild(header)

let dayEvents=events.filter(e=>
sameDay(e.start,date)
)

dayEvents.sort((a,b)=>a.start-b.start)

dayEvents.forEach(ev=>{

let div=document.createElement("div")

div.className="event"

div.style.background=ev.color

let icon=getIcon(ev)

div.innerHTML=
"<div class='icon'>"+icon+"</div>"+
"<div>"+time(ev.start)+" "+ev.title+"</div>"

col.appendChild(div)

})

week.appendChild(col)

}

agenda.appendChild(week)

if(bigIcons)
agenda.classList.add("large")
else
agenda.classList.remove("large")

}

function sameDay(a,b){

return a.getFullYear()==b.getFullYear()
&& a.getMonth()==b.getMonth()
&& a.getDate()==b.getDate()

}

function time(d){

return d.getHours().toString().padStart(2,"0")+":"+
d.getMinutes().toString().padStart(2,"0")

}

function getIcon(ev){

let t=ev.title.toLowerCase()
let loc=(ev.location||"").toLowerCase()

if(loc.includes("orelia puthof"))
return "👩‍⚕️"

if(t.includes("rita oppas thuis") || t.includes("oppas door loriana"))
return "🏠"

if(t.includes("rita oppas bij haar"))
return "🧳"

if(t.includes("school"))
return "🎒"

if(t.includes("zwem"))
return "🏊"

if(t.includes("voetbal"))
return "⚽"

if(t.includes("dokter"))
return "🩺"

return "📌"

}

function prevWeek(){

currentWeekStart.setDate(currentWeekStart.getDate()-7)
render()

}

function nextWeek(){

currentWeekStart.setDate(currentWeekStart.getDate()+7)
render()

}

function today(){

currentWeekStart=getMonday(new Date())
render()

}

function toggleView(){

dayMode=!dayMode
render()

}

function toggleIcons(){

bigIcons=!bigIcons
render()

}

function selectAll(){

document.querySelectorAll("#filters input")
.forEach(c=>c.checked=true)

render()

}

function selectNone(){

document.querySelectorAll("#filters input")
.forEach(c=>c.checked=false)

render()

}

load()

</script>

</body>
</html>
