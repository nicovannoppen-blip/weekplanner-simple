<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Familie Agenda</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#4285F4;
color:white;
padding:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
align-items:center;
}

button{
border:none;
border-radius:8px;
padding:8px 14px;
cursor:pointer;
background:white;
}

#filters{
background:white;
padding:10px;
display:flex;
gap:14px;
flex-wrap:wrap;
border-bottom:1px solid #ddd;
}

#agenda{
padding:10px;
}

.week{
display:flex;
gap:6px;
}

.day{
flex:1;
background:white;
border-radius:10px;
position:relative;
height:960px;
}

.dayHeader{
text-align:center;
font-weight:bold;
padding:8px;
border-bottom:1px solid #ddd;
}

.hour{
position:absolute;
left:0;
right:0;
border-top:1px solid #eee;
font-size:10px;
color:#888;
}

.event{
position:absolute;
border-radius:6px;
color:white;
padding:4px;
font-size:12px;
display:flex;
gap:5px;
align-items:center;
overflow:hidden;
}

.icon{
font-size:16px;
}

.large .icon{
font-size:34px;
display:block;
}

.large .event{
flex-direction:column;
text-align:center;
}

.dayview{
width:80%;
margin:auto;
}

</style>
</head>

<body>

<header>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="prev()">◀ week</button>
<button onclick="today()">vandaag</button>
<button onclick="next()">week ▶</button>

<button onclick="toggleView()">dag/week</button>

<button onclick="toggleIcons()">grote picto</button>

<button onclick="allOn()">alles aan</button>
<button onclick="allOff()">alles uit</button>

<button onclick="window.print()">print / pdf</button>

</header>

<div id="filters"></div>
<div id="agenda"></div>

<script>

const CLIENT="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com"

let token=null
let calendars=[]
let events=[]

let monday=getMonday(new Date())

let view="week"
let big=false

const HIDDEN=[
"Weeknummers",
"Agenda",
"Borgloon Weather",
"agenda website"
]

function login(){

let url="https://accounts.google.com/o/oauth2/v2/auth"

let params={
client_id:CLIENT,
redirect_uri:location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

location=url+"?"+new URLSearchParams(params)

}

function logout(){

token=null
localStorage.removeItem("token")
render()

}

function checkToken(){

let hash=new URLSearchParams(location.hash.substring(1))
token=hash.get("access_token")

if(token){
localStorage.setItem("token",token)
init()
return
}

token=localStorage.getItem("token")

if(token) init()

}

async function init(){

await loadCalendars()
await loadEvents()
render()

}

async function loadCalendars(){

let r=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+token}}
)

let data=await r.json()

calendars=data.items.filter(c=>!HIDDEN.includes(c.summary))

buildFilters()

}

function buildFilters(){

let f=document.getElementById("filters")
f.innerHTML=""

calendars.forEach(c=>{

let label=document.createElement("label")

label.innerHTML=
`<input type="checkbox" checked value="${c.id}"> ${rename(c.summary)}`

label.querySelector("input").onchange=render

f.appendChild(label)

})

}

function rename(n){

if(n.includes("Belgie Feestdagen")) return "feestdagen"
return n

}

async function loadEvents(){

events=[]

let start=new Date(monday)
let end=new Date(monday)
end.setDate(end.getDate()+7)

for(let cal of calendars){

let url=
`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?`+
`timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=2500`

let r=await fetch(url,{
headers:{Authorization:"Bearer "+token}
})

let data=await r.json()

data.items.forEach(e=>{

if(!e.start?.dateTime) return

events.push({
title:e.summary,
start:new Date(e.start.dateTime),
end:new Date(e.end.dateTime),
calendar:cal.id,
color:cal.backgroundColor||"#4285F4",
location:e.location||""
})

})

}

}

function activeCalendars(){

let a=[]
document.querySelectorAll("#filters input:checked")
.forEach(c=>a.push(c.value))
return a

}

function render(){

let ag=document.getElementById("agenda")
ag.innerHTML=""

let container=document.createElement("div")

if(view=="week") container.className="week"
else container.className="week dayview"

for(let i=0;i<(view=="week"?7:1);i++){

let d=new Date(monday)
d.setDate(d.getDate()+i)

let col=document.createElement("div")
col.className="day"

let head=document.createElement("div")
head.className="dayHeader"

head.innerText=
d.toLocaleDateString("nl-BE",{weekday:"long"})+
" "+
d.toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit"})

col.appendChild(head)

for(let h=7;h<=23;h++){

let line=document.createElement("div")
line.className="hour"
line.style.top=((h-7)*60)+"px"
line.innerText=h+":00"

col.appendChild(line)

}

let dayEvents=events
.filter(e=>activeCalendars().includes(e.calendar))
.filter(e=>sameDay(e.start,d))
.sort((a,b)=>a.start-b.start)

layoutEvents(dayEvents).forEach(ev=>{

let top=(ev.start.getHours()-7)*60+ev.start.getMinutes()
let dur=(ev.end-ev.start)/60000

let div=document.createElement("div")

div.className="event"
div.style.top=top+"px"
div.style.height=dur+"px"
div.style.left=(ev.col*33+2)+"%"
div.style.width="30%"
div.style.background=ev.color

div.innerHTML=
`<div class="icon">${icon(ev)}</div>
<div>${time(ev.start)} ${ev.title}</div>`

col.appendChild(div)

})

container.appendChild(col)

}

ag.appendChild(container)

if(big) ag.classList.add("large")
else ag.classList.remove("large")

}

function layoutEvents(list){

let cols=[]

list.forEach(e=>{

let placed=false

for(let i=0;i<cols.length;i++){

if(cols[i].every(o=>e.start>=o.end||e.end<=o.start)){
cols[i].push(e)
e.col=i
placed=true
break
}

}

if(!placed){
cols.push([e])
e.col=cols.length-1
}

})

return list

}

function icon(e){

let t=e.title.toLowerCase()
let l=e.location.toLowerCase()

if(l.includes("orelia puthof")) return "👩‍⚕️"
if(t.includes("bus")) return "🚌"
if(t.includes("rijden")) return "🚗"
if(t.includes("slapen")) return "😴"
if(t.includes("rita oppas thuis")) return "🏠"
if(t.includes("rita oppas bij haar")) return "🧳"

return "📌"

}

function sameDay(a,b){
return a.getFullYear()==b.getFullYear() &&
a.getMonth()==b.getMonth() &&
a.getDate()==b.getDate()
}

function time(d){
return d.getHours().toString().padStart(2,"0")+":"+
d.getMinutes().toString().padStart(2,"0")
}

function getMonday(d){

d=new Date(d)

let day=d.getDay()
let diff=d.getDate()-day+(day==0?-6:1)

return new Date(d.setDate(diff))

}

function prev(){
monday.setDate(monday.getDate()-7)
init()
}

function next(){
monday.setDate(monday.getDate()+7)
init()
}

function today(){
monday=getMonday(new Date())
init()
}

function toggleView(){
view=view=="week"?"day":"week"
render()
}

function toggleIcons(){
big=!big
render()
}

function allOn(){
document.querySelectorAll("#filters input")
.forEach(c=>c.checked=true)
render()
}

function allOff(){
document.querySelectorAll("#filters input")
.forEach(c=>c.checked=false)
render()
}

checkToken()

</script>

</body>
</html>
