<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto PRO+</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f1f3f4;
}

header {
  background: #4285F4;
  color: white;
  padding: 15px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
}

button {
  padding: 8px 14px;
  margin: 4px;
  border: none;
  background: white;
  color: #4285F4;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
}

#controls {
  padding:10px;
  background:white;
}

#calendar {
  padding: 15px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
}

.day-column {
  background: #e8eaed;
  padding: 10px;
  border-radius: 8px;
  min-height: 250px;
}

.day-column h3 {
  margin-top:0;
}

.event-block {
  padding: 8px;
  margin-bottom: 8px;
  border-radius: 6px;
  color: white;
  font-size: 13px;
}

.event-header {
  display:flex;
  align-items:center;
  gap:6px;
}

.event-header img {
  width:18px;
  height:18px;
}

/* Kinder modus */
.kid-mode .event-block {
  font-size:18px;
  padding:14px;
}

.kid-mode .event-header img {
  width:36px;
  height:36px;
}

/* Print */
@media print {
  header, #controls button {
    display:none;
  }
  body {
    background:white;
  }
}
</style>
</head>
<body>

<header>
  <div><strong>AgendaPicto PRO+</strong></div>
  <div>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <button onclick="previousWeek()">← Vorige week</button>
    <button onclick="nextWeek()">Volgende week →</button>
    <button onclick="toggleKidMode()">Kinder-modus</button>
    <button onclick="window.print()">Print</button>
    <button onclick="savePDF()">Opslaan als PDF</button>
  </div>
</header>

<div id="controls"></div>
<div id="calendar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const CLIENT_ID = "259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com";

let accessToken = null;
let currentMonday = null;
let allEvents = [];
let allCalendars = [];
let kidMode = false;

/* LOGIN */
function login() {
  const oauth2Endpoint = "https://accounts.google.com/o/oauth2/v2/auth";

  const params = {
    client_id: CLIENT_ID,
    redirect_uri: window.location.origin,
    response_type: "token",
    scope: "https://www.googleapis.com/auth/calendar.readonly",
  };

  window.location = oauth2Endpoint + "?" + new URLSearchParams(params).toString();
}

function logout() {
  accessToken = null;
  location.hash = "";
  location.reload();
}

function parseToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  accessToken = params.get("access_token");
  if (accessToken) init();
}

/* DATUM */
function getMonday(d) {
  const date = new Date(d);
  date.setDate(d.getDate() - (d.getDay() + 6) % 7);
  date.setHours(0,0,0,0);
  return date;
}

function nextWeek() {
  currentMonday.setDate(currentMonday.getDate() + 7);
  loadEvents().then(renderWeek);
}

function previousWeek() {
  currentMonday.setDate(currentMonday.getDate() - 7);
  loadEvents().then(renderWeek);
}

/* GOOGLE DATA */
async function loadCalendars() {
  const res = await fetch(
    "https://www.googleapis.com/calendar/v3/users/me/calendarList",
    { headers: { Authorization: "Bearer " + accessToken } }
  );
  const data = await res.json();
  allCalendars = data.items;
}

async function loadEvents() {

  const end = new Date(currentMonday);
  end.setDate(currentMonday.getDate() + 7);

  allEvents = [];

  for (const cal of allCalendars) {
    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?` +
      `timeMin=${currentMonday.toISOString()}&` +
      `timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`,
      { headers: { Authorization: "Bearer " + accessToken } }
    );

    const data = await res.json();
    if (data.items) {
      data.items.forEach(e => {
        e.calendarName = cal.summary;
        e.calendarColor = cal.backgroundColor || "#5f6368";
        allEvents.push(e);
      });
    }
  }
}

/* FILTERS */
function renderFilters() {
  const container = document.getElementById("controls");
  container.innerHTML = "<strong>Filter agenda's:</strong><br>";

  allCalendars.forEach(cal => {
    const id = "chk_" + cal.id.replace(/[^a-zA-Z0-9]/g,"");
    container.innerHTML += `
      <label>
        <input type="checkbox" id="${id}" checked onchange="renderWeek()">
        ${cal.summary}
      </label>
    `;
  });
}

function getSelectedCalendars() {
  return allCalendars.filter(cal => {
    const id = "chk_" + cal.id.replace(/[^a-zA-Z0-9]/g,"");
    return document.getElementById(id)?.checked;
  }).map(c => c.summary);
}

/* RENDER */
function renderWeek() {

  const selected = getSelectedCalendars();
  const container = document.getElementById("calendar");
  container.innerHTML = "";

  const days = ["Ma","Di","Wo","Do","Vr","Za","Zo"];
  const columns = [];

  for (let i=0;i<7;i++) {
    const col = document.createElement("div");
    col.className = "day-column";

    const d = new Date(currentMonday);
    d.setDate(currentMonday.getDate()+i);

    col.innerHTML = `<h3>${days[i]} ${d.getDate()}/${d.getMonth()+1}</h3>`;
    container.appendChild(col);
    columns.push(col);
  }

  /* 🔥 BELANGRIJK: eerst globaal sorteren op tijd */
  const sortedEvents = allEvents
    .filter(e => selected.includes(e.calendarName))
    .sort((a,b) => {
      const dateA = new Date(a.start.dateTime || a.start.date);
      const dateB = new Date(b.start.dateTime || b.start.date);
      return dateA - dateB;
    });

  sortedEvents.forEach(event => {

    const date = new Date(event.start.dateTime || event.start.date);
    const dayIndex = (date.getDay()+6)%7;

    const block = document.createElement("div");
    block.className = "event-block";
    block.style.background = event.calendarColor;

    const icon = getIcon(event.summary);

    block.innerHTML = `
      <div class="event-header">
        <img src="https://api.iconify.design/mdi/${icon}.svg?color=white">
        <strong>${event.summary}</strong>
      </div>
      <small>${formatTime(date)} • ${event.calendarName}</small>
    `;

    columns[dayIndex].appendChild(block);
  });
}

/* ICONS */
function getIcon(text) {
  const t = text.toLowerCase();

  if (t.includes("voetbal")) return "soccer";
  if (t.includes("zwem")) return "swim";
  if (t.includes("dokter")) return "medical-bag";
  if (t.includes("tandarts")) return "tooth";
  if (t.includes("school")) return "school";
  if (t.includes("verjaardag")) return "cake-variant";
  if (t.includes("feest")) return "party-popper";
  if (t.includes("werk")) return "briefcase";
  if (t.includes("eten")) return "silverware-fork-knife";
  if (t.includes("film")) return "movie-open";
  if (t.includes("muziek")) return "music";
  if (t.includes("auto")) return "car";
  if (t.includes("fiets")) return "bike";

  return "calendar";
}

function formatTime(date) {
  if (!date.getHours()) return "Hele dag";
  return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

/* KINDER MODUS */
function toggleKidMode() {
  kidMode = !kidMode;
  document.body.classList.toggle("kid-mode");
}

/* PDF */
async function savePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("landscape");
  doc.setFontSize(14);
  doc.text("AgendaPicto Weekoverzicht", 10, 10);

  let y = 20;
  document.querySelectorAll(".day-column").forEach(col => {
    doc.text(col.innerText, 10, y);
    y += 10;
  });

  doc.save("AgendaPicto.pdf");
}

  async function init() {
  currentMonday = getMonday(new Date());
  await loadCalendars();
  renderFilters();
  await loadEvents();
  renderWeek();
}
  
parseToken();

</script>

</body>
</html>
