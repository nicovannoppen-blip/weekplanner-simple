<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Familie Agenda</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#4285F4;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
align-items:center;
}

button{
padding:7px 12px;
border:none;
border-radius:6px;
background:white;
cursor:pointer;
}

#filters{
background:white;
padding:10px;
display:flex;
gap:12px;
flex-wrap:wrap;
border-bottom:1px solid #ddd;
}

.week{
display:flex;
height:960px;
}

.day{
flex:1;
background:white;
margin:4px;
border-radius:8px;
position:relative;
}

.dayHeader{
text-align:center;
font-weight:bold;
padding:6px;
border-bottom:1px solid #ddd;
background:#fafafa;
}

.hour{
position:absolute;
left:0;
right:0;
border-top:1px solid #eee;
font-size:10px;
color:#888;
}

.event{
position:absolute;
border-radius:6px;
color:white;
padding:4px;
font-size:12px;
display:flex;
gap:5px;
align-items:center;
overflow:hidden;
}

.icon{
font-size:16px;
}

.large .icon{
font-size:34px;
display:block;
}

.large .event{
flex-direction:column;
text-align:center;
}

.dayview{
width:80%;
margin:auto;
}

</style>
</head>

<body>

<header>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="prevWeek()">◀ week</button>
<button onclick="today()">vandaag</button>
<button onclick="nextWeek()">week ▶</button>

<button onclick="toggleDayView()">dag/week</button>

<button id="prevDayBtn" onclick="prevDay()" style="display:none">◀ dag</button>
<button id="nextDayBtn" onclick="nextDay()" style="display:none">dag ▶</button>

<button onclick="toggleIcons()">grote picto</button>

<button onclick="selectAll()">alles aan</button>
<button onclick="selectNone()">alles uit</button>

<button onclick="window.print()">print / pdf</button>

</header>

<div id="filters"></div>
<div id="agenda"></div>

<script>

const CLIENT_ID="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com"

let token=null
let calendars=[]
let events=[]
let currentMonday=getMonday(new Date())
let currentDay=new Date()
let bigIcons=false
let dayView=false

const HIDDEN=[
"Weeknummers",
"Agenda",
"Borgloon Weather",
"agenda website"
]

function login(){

const url="https://accounts.google.com/o/oauth2/v2/auth"

const params={
client_id:CLIENT_ID,
redirect_uri:window.location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

window.location=url+"?"+new URLSearchParams(params)

}

function logout(){
token=null
events=[]
render()
}

function parseToken(){

const hash=location.hash.substring(1)
const params=new URLSearchParams(hash)

token=params.get("access_token")

if(token) init()

}

async function init(){

await loadCalendars()
await loadEvents()
render()

}

async function loadCalendars(){

let r=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+token}}
)

let data=await r.json()

calendars=data.items
.filter(c=>!HIDDEN.includes(c.summary))
.map(c=>({
id:c.id,
name:rename(c.summary),
color:c.backgroundColor
}))

buildFilters()

}

function rename(n){

if(n.includes("Belgie Feestdagen")) return "feestdagen"
return n

}

function buildFilters(){

let f=document.getElementById("filters")
f.innerHTML=""

calendars.forEach(c=>{

let label=document.createElement("label")

label.innerHTML=
`<input type="checkbox" checked value="${c.id}"> ${c.name}`

label.querySelector("input").addEventListener("change",render)

f.appendChild(label)

})

}

async function loadEvents(){

events=[]

let start=new Date(currentMonday)
start.setHours(0,0,0)

let end=new Date(currentMonday)
end.setDate(end.getDate()+7)

for(let cal of calendars){

let url=
`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?`+
`timeMin=${start.toISOString()}&`+
`timeMax=${end.toISOString()}&`+
`singleEvents=true&`+
`orderBy=startTime&`+
`maxResults=2500`

let r=await fetch(url,{
headers:{Authorization:"Bearer "+token}
})

let data=await r.json()

data.items.forEach(e=>{

if(!e.start?.dateTime) return

events.push({

title:e.summary,
start:new Date(e.start.dateTime),
end:new Date(e.end.dateTime),
color:cal.color,
calendar:cal.id,
location:e.location||""

})

})

}

}

function activeCalendars(){

let list=[]

document.querySelectorAll("#filters input:checked")
.forEach(cb=>list.push(cb.value))

return list

}

function render(){

let agenda=document.getElementById("agenda")
agenda.innerHTML=""

document.getElementById("prevDayBtn").style.display = dayView ? "inline-block":"none"
document.getElementById("nextDayBtn").style.display = dayView ? "inline-block":"none"

let active=activeCalendars()

let container=document.createElement("div")
container.className=dayView?"dayview":"week"

let days=dayView?1:7

for(let i=0;i<days;i++){

let d = dayView ? new Date(currentDay) : new Date(currentMonday)

if(!dayView) d.setDate(d.getDate()+i)

let col=document.createElement("div")
col.className="day"

let head=document.createElement("div")
head.className="dayHeader"

head.innerText=
d.toLocaleDateString("nl-BE",{weekday:"long"})+
" "+
d.toLocaleDateString("nl-BE",{day:"2-digit",month:"2-digit"})

col.appendChild(head)

for(let h=7;h<=23;h++){

let line=document.createElement("div")
line.className="hour"
line.style.top=((h-7)*60)+"px"
line.innerText=h+":00"

col.appendChild(line)

}

let dayEvents=events
.filter(e=>active.includes(e.calendar))
.filter(e=>sameDay(e.start,d))
.sort((a,b)=>a.start-b.start)

let columns=[]

dayEvents.forEach(e=>{

let placed=false

for(let colIndex=0;colIndex<columns.length;colIndex++){

let last=columns[colIndex][columns[colIndex].length-1]

if(e.start>=last.end){

columns[colIndex].push(e)
e.col=colIndex
placed=true
break

}

}

if(!placed){

columns.push([e])
e.col=columns.length-1

}

})

let totalCols=columns.length

dayEvents.forEach(e=>{

let start=(e.start.getHours()-7)*60+e.start.getMinutes()
let dur=(e.end-e.start)/60000

let div=document.createElement("div")
div.className="event"

div.style.top=start+"px"
div.style.height=dur+"px"
div.style.background=e.color

div.style.width=(88/totalCols)+"%"
div.style.left=(6+(e.col*(88/totalCols)))+"%"

div.innerHTML=
`<div class="icon">${icon(e)}</div>
<div>${time(e.start)} ${e.title}</div>`

col.appendChild(div)

})

container.appendChild(col)

}

agenda.appendChild(container)

if(bigIcons) agenda.classList.add("large")
else agenda.classList.remove("large")

}

function icon(e){

let t=e.title.toLowerCase()
let l=e.location.toLowerCase()

if(l.includes("orelia")) return "👩‍⚕️"
if(l.includes("kapelstraat")) return "⛑"
if(t.includes("bus naar school")) return "🚌"
if(t.includes("bus naar huis")) return "🏠🚌"
if(t.includes("school")) return "🎒"
if(t.includes("zwemmen")) return "🏊"
if(t.includes("dokter")) return "🏥"
if(t.includes("beugel")) return "🦷"
if(t.includes("slapen")) return "😴"
if(t.includes("rita oppas thuis")||t.includes("oppas door loriana")) return "🏠👵"
if(t.includes("rita oppas bij haar")) return "🧳👵"
if(t.includes("rijden")) return "🚗"
if(t.includes("winkel")) return "🛒"

return "📌"

}

function prevDay(){

currentDay.setDate(currentDay.getDate()-1)
render()

}

function nextDay(){

currentDay.setDate(currentDay.getDate()+1)
render()

}

function sameDay(a,b){

return a.getFullYear()==b.getFullYear() &&
a.getMonth()==b.getMonth() &&
a.getDate()==b.getDate()

}

function time(d){

return d.getHours().toString().padStart(2,"0")+":"+
d.getMinutes().toString().padStart(2,"0")

}

function getMonday(d){

d=new Date(d)

let day=d.getDay()
let diff=d.getDate()-day+(day==0?-6:1)

return new Date(d.setDate(diff))

}

function prevWeek(){
currentMonday.setDate(currentMonday.getDate()-7)
init()
}

function nextWeek(){
currentMonday.setDate(currentMonday.getDate()+7)
init()
}

function today(){
currentMonday=getMonday(new Date())
currentDay=new Date()
init()
}

function toggleIcons(){
bigIcons=!bigIcons
render()
}

function toggleDayView(){
dayView=!dayView
render()
}

function selectAll(){
document.querySelectorAll("#filters input")
.forEach(c=>c.checked=true)
render()
}

function selectNone(){
document.querySelectorAll("#filters input")
.forEach(c=>c.checked=false)
render()
}

parseToken()

</script>

</body>
</html>
