<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<title>❤️Agenda Vannoppekes❤️</title>

<link rel="icon" href="favicon.ico">
<link rel="shortcut icon" href="/favicon.ico">
    
<link rel="stylesheet" href="style.css">
<style>
#speechOverlay{
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    border:2px solid #4285F4;
    border-radius:8px;
    padding:12px;
    z-index:1000;
    max-width:300px;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    font-size:14px;
    line-height:1.4;
}

@media print {
    body * { display:none; }
    #printContainer, #printContainer * { display:block; }

    .printDay {
        page-break-after: always;
        position: relative;
        width: 100%;
        height: 960px; /* match je digitale agenda */
        margin:0;
        padding:20px;
        background:white;
        font-family:Arial,sans-serif;
    }

    .printDay h2 {
        font-size:24px;
        text-align:center;
        margin-bottom:10px;
    }

    .printDayContainer {
      position: relative;
      height: 16*60px; /* 16 uur van 7-23, 60px per uur */
      border-bottom: 1px solid #ccc;
    }

    .printHour {
      position: absolute;
      left: 0;
      width: 100%;
      font-size: 10px;
      color: #999;
      border-top: 1px dotted #ccc;
    }

    .printEvent {
      position: absolute;
      border-radius: 4px;
      color: #000;
      font-size: 12px;
      padding: 1px 2px;
      box-sizing: border-box;
    }

    .printEvent .picto {
        width:28px;
        height:28px;
        margin-bottom:2px;
    }

    /* Grotere pictogrammen als bigIcons aanstaat */
    body.large #printContainer .printEvent .picto {
        width:64px;
        height:64px;
    }

    @page { size:A4; margin:15mm; }
}
</style>
</head>

<body>

<header>
<button onclick="login()">🔐 login</button>
<button onclick="prev()">⬅ vorige</button>
<button onclick="today()">📅 vandaag</button>
<button onclick="next()">➡ volgende</button>
<button onclick="toggleView()">🗓 dag/week</button>
<button onclick="toggleIcons()">🖼 grote picto</button>
<button onclick="selectAll()">✅ alles</button>
<button onclick="selectNone()">❌ niets</button>

<button onclick="printWeek()">🖨 print week</button>
    
<!-- Toon en lees komende 4 agendapunten -->
<button onclick="showNextEvents()">🔊 afspraken</button>

</header>

<div id="filters"></div>
<div id="agenda"></div>

<!-- Overlay voor spraaktekst -->
<div id="speechOverlay" style="display:none;"></div>

<script src="config.js"></script>
<script src="script.js"></script>
    
<div id="popup" class="popup">
<div class="popupContent">
<div id="popupText"></div>
<button onclick="closePopup()">OK</button>
</div>
</div>
    
</body>
</html>
