<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AgendaPicto Weekplanner</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

</head>

<body>

<h1>AgendaPicto</h1>

<div class="week">

<div class="day" data-day="ma">
<h2>Maandag</h2>
<div class="slots"></div>
<button onclick="addItem('ma')">+</button>
</div>

<div class="day" data-day="di">
<h2>Dinsdag</h2>
<div class="slots"></div>
<button onclick="addItem('di')">+</button>
</div>

<div class="day" data-day="wo">
<h2>Woensdag</h2>
<div class="slots"></div>
<button onclick="addItem('wo')">+</button>
</div>

<div class="day" data-day="do">
<h2>Donderdag</h2>
<div class="slots"></div>
<button onclick="addItem('do')">+</button>
</div>

<div class="day" data-day="vr">
<h2>Vrijdag</h2>
<div class="slots"></div>
<button onclick="addItem('vr')">+</button>
</div>

<div class="day" data-day="za">
<h2>Zaterdag</h2>
<div class="slots"></div>
<button onclick="addItem('za')">+</button>
</div>

<div class="day" data-day="zo">
<h2>Zondag</h2>
<div class="slots"></div>
<button onclick="addItem('zo')">+</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
