<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f7;
}

header{
background:#4285F4;
color:white;
padding:12px;
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
background:white;
cursor:pointer;
}

#filters{
padding:10px;
background:white;
display:flex;
gap:10px;
flex-wrap:wrap;
}

#calendar{
padding:10px;
}

.day{
background:white;
margin-bottom:15px;
border-radius:6px;
padding:10px;
}

.day h2{
margin-top:0;
}

.timeline{
position:relative;
height:920px;
border-left:2px solid #ddd;
}

.hour{
position:absolute;
left:-50px;
font-size:12px;
color:#666;
}

.event{
position:absolute;
left:60px;
right:10px;
border-radius:6px;
padding:4px;
font-size:13px;
display:flex;
align-items:center;
gap:5px;
}

.icon{
width:20px;
height:20px;
}

</style>
</head>

<body>

<header>

<b>AgendaPicto</b>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="prevWeek()">◀</button>
<button onclick="nextWeek()">▶</button>

<button onclick="viewWeek()">Week</button>
<button onclick="viewDay()">Dag</button>

<button onclick="selectAll()">Alles</button>
<button onclick="selectNone()">Geen</button>

</header>

<div id="filters"></div>
<div id="calendar"></div>

<script>

const CLIENT_ID="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com"

let accessToken=null
let calendars=[]
let events=[]

let currentDate=new Date()
let viewMode="week"

const HIDDEN_CALENDARS=[
"Weeknummers",
"Agenda",
"Borgloon Weather",
"agenda website"
]

function login(){

const url="https://accounts.google.com/o/oauth2/v2/auth"

const params={
client_id:CLIENT_ID,
redirect_uri:window.location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

window.location=url+"?"+new URLSearchParams(params)

}

function logout(){

accessToken=null
events=[]
document.getElementById("calendar").innerHTML=""

}

function parseToken(){

const hash=window.location.hash.substring(1)

const params=new URLSearchParams(hash)

accessToken=params.get("access_token")

if(accessToken){

loadCalendars()

}

}

async function loadCalendars(){

const res=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+accessToken}}
)

const data=await res.json()

calendars=data.items.filter(c=>!HIDDEN_CALENDARS.includes(c.summary))

renderFilters()

loadEvents()

}

function renderFilters(){

const div=document.getElementById("filters")

div.innerHTML=""

calendars.forEach(c=>{

let name=c.summary

if(name.includes("Feestdagen")){
name="feestdagen"
}

div.innerHTML+=`
<label>
<input type="checkbox" checked value="${c.id}">
${name}
</label>
`

})

}

async function loadEvents(){

events=[]

for(const cal of calendars){

const res=await fetch(
`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events`,
{
headers:{Authorization:"Bearer "+accessToken}
}
)

const data=await res.json()

data.items.forEach(e=>{

events.push({
...e,
calendar:cal.summary
})

})

}

render()

}

function getIcon(e){

const text=(e.summary||"").toLowerCase()
const loc=(e.location||"").toLowerCase()

if(text.includes("bus"))
return "https://api.iconify.design/mdi/bus.svg"

if(text.includes("slapen"))
return "https://api.iconify.design/mdi/sleep.svg"

if(text.includes("rijden"))
return "https://api.iconify.design/mdi/car.svg"

if(loc.includes("orelia puthof"))
return "https://api.iconify.design/mdi/nurse.svg"

if(text.includes("rita oppas thuis") || text.includes("oppas door loriana"))
return "https://api.iconify.design/mdi/home-heart.svg"

if(text.includes("rita oppas bij haar"))
return "https://api.iconify.design/mdi/home-export-outline.svg"

return "https://api.iconify.design/mdi/calendar.svg"

}

function render(){

if(viewMode==="week"){
renderWeek()
}else{
renderDay()
}

}

function renderWeek(){

const start=new Date(currentDate)

start.setDate(start.getDate()-start.getDay()+1)

const container=document.getElementById("calendar")

container.innerHTML=""

for(let i=0;i<7;i++){

const day=new Date(start)

day.setDate(start.getDate()+i)

renderSingleDay(container,day)

}

}

function renderDay(){

const container=document.getElementById("calendar")

container.innerHTML=""

renderSingleDay(container,currentDate)

}

function renderSingleDay(container,day){

const dayStr=day.toISOString().split("T")[0]

const div=document.createElement("div")

div.className="day"

div.innerHTML=`<h2>${day.toLocaleDateString()}</h2>`

const timeline=document.createElement("div")

timeline.className="timeline"

for(let h=0;h<=23;h++){

const label=document.createElement("div")

label.className="hour"

label.style.top=(h*40)+"px"

label.innerText=h+":00"

timeline.appendChild(label)

}

const filteredEvents=events
.filter(e=>{

const date=(e.start?.dateTime||e.start?.date||"").substring(0,10)

return date===dayStr

})
.sort((a,b)=>{

const ta=new Date(a.start?.dateTime||a.start?.date)

const tb=new Date(b.start?.dateTime||b.start?.date)

return ta-tb

})

filteredEvents.forEach(e=>{

const start=new Date(e.start?.dateTime||e.start?.date)

const end=new Date(e.end?.dateTime||e.end?.date)

const top=(start.getHours()*40)+(start.getMinutes()/60*40)

const height=((end-start)/3600000)*40

const ev=document.createElement("div")

ev.className="event"

ev.style.top=top+"px"

ev.style.height=height+"px"

ev.style.background="#"+Math.floor(Math.random()*16777215).toString(16)

ev.innerHTML=`
<img class="icon" src="${getIcon(e)}">
${e.summary}
`

timeline.appendChild(ev)

})

div.appendChild(timeline)

container.appendChild(div)

}

function prevWeek(){

currentDate.setDate(currentDate.getDate()-7)

render()

}

function nextWeek(){

currentDate.setDate(currentDate.getDate()+7)

render()

}

function viewWeek(){
viewMode="week"
render()
}

function viewDay(){
viewMode="day"
render()
}

function selectAll(){

document.querySelectorAll("#filters input").forEach(c=>c.checked=true)

render()

}

function selectNone(){

document.querySelectorAll("#filters input").forEach(c=>c.checked=false)

render()

}

parseToken()

</script>

</body>
</html>
