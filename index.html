<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto</title>

<link rel="manifest" href="/manifest.json">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f1f3f4;
}

header {
  background: #4285F4;
  color: white;
  padding: 15px;
  font-size: 20px;
}

button {
  padding: 8px 14px;
  margin: 5px;
  border: none;
  background: #4285F4;
  color: white;
  border-radius: 4px;
  cursor: pointer;
}

#calendar {
  padding: 15px;
}

.event {
  background: white;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon {
  width: 40px;
  height: 40px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<header>
AgendaPicto
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="exportPDF()">Export PDF</button>
</header>

<div id="calendar"></div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js');
}

const firebaseConfig = {
  apiKey: "AIzaSyDxhqddHdXDEWw3SfDnYKOeKW9_ejse1_c",
  authDomain: "weekplanner-pro-b16d8.firebaseapp.com",
  projectId: "weekplanner-pro-b16d8"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const provider = new firebase.auth.GoogleAuthProvider();
provider.addScope("https://www.googleapis.com/auth/calendar.readonly");

function login() {
  auth.signInWithPopup(provider);
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(async user => {
  if (user) {
    const token = await user.getIdToken();
    loadCalendar(user.accessToken || token);
  }
});

async function loadCalendar(token) {
  const response = await fetch(
    "https://www.googleapis.com/calendar/v3/calendars/primary/events",
    {
      headers: { Authorization: "Bearer " + token }
    }
  );

  const data = await response.json();
  renderEvents(data.items);
}

async function renderEvents(events) {
  const container = document.getElementById("calendar");
  container.innerHTML = "";

  for (const e of events) {
    const iconName = getSmartIcon(e.summary);

    const div = document.createElement("div");
    div.className = "event";
    div.innerHTML = `
      <img class="icon" src="/api/picto?q=${iconName}">
      <div>
        <strong>${e.summary}</strong><br>
        ${e.start?.dateTime || e.start?.date}
      </div>
    `;

    container.appendChild(div);
  }
}

async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(18);
  doc.text("AgendaPicto Weekoverzicht", 20, 15);

  let y = 30;
  document.querySelectorAll(".event").forEach(ev => {
    doc.setFontSize(12);
    doc.text(ev.innerText, 20, y);
    y += 10;
  });

  doc.save("AgendaPicto.pdf");
}
  // === GRATIS LOKALE AI ENGINE ===

const AI_DATABASE = {
  school: {
    keywords: ["school","les","toets","examen","huiswerk","taak"],
    weight: 3
  },
  sport: {
    keywords: ["voetbal","training","wedstrijd","sport","zwemmen","turnen"],
    weight: 3
  },
  dokter: {
    keywords: ["dokter","tandarts","ziekenhuis","consultatie","controle"],
    weight: 3
  },
  verjaardag: {
    keywords: ["verjaardag","feest","party","cadeau"],
    weight: 3
  },
  werk: {
    keywords: ["werk","meeting","vergadering","kantoor","shift"],
    weight: 3
  },
  eten: {
    keywords: ["eten","restaurant","diner","lunch","avondeten"],
    weight: 2
  }
};

function normalizeText(text) {
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function fuzzyMatch(word, text) {
  return text.includes(word);
}

function getSmartIcon(text) {
  const normalized = normalizeText(text);
  let scores = {};

  for (const category in AI_DATABASE) {
    scores[category] = 0;

    AI_DATABASE[category].keywords.forEach(keyword => {
      if (fuzzyMatch(keyword, normalized)) {
        scores[category] += AI_DATABASE[category].weight;
      }
    });
  }

  let bestMatch = "algemeen";
  let highestScore = 0;

  for (const category in scores) {
    if (scores[category] > highestScore) {
      highestScore = scores[category];
      bestMatch = category;
    }
  }

  return bestMatch;
}
</script>

</body>
</html>
