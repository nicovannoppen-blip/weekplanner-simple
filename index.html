<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxhqddHdXDEWw3SfDnYKOeKW9_ejse1_c",
  authDomain: "weekplanner-pro-b16d8.firebaseapp.com",
  projectId: "weekplanner-pro-b16d8",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// 👇 BELANGRIJK: agenda toestemming toevoegen
provider.addScope("https://www.googleapis.com/auth/calendar.readonly");

const appDiv = document.getElementById("app");

function showLogin() {
  appDiv.innerHTML = `
    <div style="text-align:center;margin-top:100px;">
      <h1>Weekplanner</h1>
      <button id="loginBtn">Inloggen met Google</button>
    </div>
  `;

  document.getElementById("loginBtn").onclick = () =>
    signInWithPopup(auth, provider);
}

async function loadCalendars(user) {
  const token = await user.getIdToken();

  const res = await fetch(
    "https://www.googleapis.com/calendar/v3/users/me/calendarList",
    {
      headers: {
        Authorization: "Bearer " + token,
      },
    }
  );

  const data = await res.json();
  renderCalendars(user, data.items);
}

async function loadEvents(calendarId, token) {
  const today = new Date().toISOString();

  const res = await fetch(
    `https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events?timeMin=${today}&maxResults=10&singleEvents=true&orderBy=startTime`,
    {
      headers: {
        Authorization: "Bearer " + token,
      },
    }
  );

  return await res.json();
}

function getIcon(text) {
  text = text.toLowerCase();

  if (text.includes("school")) return "🏫";
  if (text.includes("voetbal")) return "⚽";
  if (text.includes("dokter")) return "🩺";
  if (text.includes("feest")) return "🎉";
  if (text.includes("zwem")) return "🏊";
  return "📌";
}

async function renderCalendars(user, calendars) {
  const token = await user.getIdToken();

  appDiv.innerHTML = `<h2 style="text-align:center;">Welkom ${user.displayName}</h2><div style="display:flex;flex-wrap:wrap;gap:20px;justify-content:center;"></div>`;

  const container = appDiv.querySelector("div");

  for (let cal of calendars) {
    const eventsData = await loadEvents(cal.id, token);

    const card = document.createElement("div");
    card.style.background = "#f2f2f2";
    card.style.padding = "20px";
    card.style.width = "250px";
    card.style.borderRadius = "10px";

    let html = `<h3>${cal.summary}</h3>`;

    if (eventsData.items.length === 0) {
      html += "<p>Geen komende activiteiten</p>";
    } else {
      eventsData.items.forEach(e => {
        html += `<div>${getIcon(e.summary)} ${e.summary}</div>`;
      });
    }

    card.innerHTML = html;
    container.appendChild(card);
  }
}

onAuthStateChanged(auth, user => {
  if (user) {
    loadCalendars(user);
  } else {
    showLogin();
  }
});
</script>
