<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto EXTREME</title>

<style>
  

body{
font-family:Arial;
margin:0;
background:#eef2f5;
}

header{
background:#4285F4;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
align-items:center;
}

button{
border:none;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

#filters{
background:white;
padding:10px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
padding:10px;
}

.day{
background:white;
border-radius:8px;
position:relative;
height:1020px;
overflow:hidden;
}

.dayTitle{
background:#f5f5f5;
padding:6px;
text-align:center;
font-weight:bold;
}

.timeline{
position:absolute;
top:30px;
left:0;
right:0;
bottom:0;
}

.hour{
height:60px;
border-top:1px solid #eee;
font-size:10px;
padding-left:4px;
color:#999;
}

.event{
position:absolute;
border-radius:8px;
color:white;
padding:6px;
font-size:12px;
cursor:grab;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.event img{
width:24px;
height:24px;
margin-bottom:3px;
}

.kid .event{
font-size:20px;
padding:12px;
}

.kid .event img{
width:48px;
height:48px;
}

@media print{
header,#filters{
display:none;
}
body{
background:white;
}
}

</style>
</head>

<body>

<header>

<b>AgendaPicto EXTREME</b>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="prevWeek()">←</button>
<button onclick="nextWeek()">→</button>

<button onclick="setWeek()">Week</button>
<button onclick="setDay()">Dag</button>

<button onclick="toggleKid()">Kinder-modus</button>

<button onclick="selectAll()">Alles aan</button>
<button onclick="selectNone()">Alles uit</button>

<button onclick="window.print()">Print</button>

</header>

<div id="filters"></div>
<div id="calendar"></div>

<script>

const CLIENT_ID="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com"

let token=null
let calendars=[]
let events=[]
let monday=null
let view="week"

function login(){

const url="https://accounts.google.com/o/oauth2/v2/auth"

const params={
client_id:CLIENT_ID,
redirect_uri:window.location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

window.location=url+"?"+new URLSearchParams(params)

}

function logout(){
location.hash=""
location.reload()
}

function parseToken(){

const hash=window.location.hash.substring(1)
const params=new URLSearchParams(hash)

token=params.get("access_token")

if(token) init()

}

async function init(){

monday=getMonday(new Date())

await loadCalendars()

renderFilters()

await loadEvents()

render()

}

function getMonday(d){

d=new Date(d)

d.setDate(d.getDate()-(d.getDay()+6)%7)

d.setHours(0,0,0,0)

return d

}

function nextWeek(){
monday.setDate(monday.getDate()+7)
loadEvents().then(render)
}

function prevWeek(){
monday.setDate(monday.getDate()-7)
loadEvents().then(render)
}

function setWeek(){
view="week"
render()
}

function setDay(){
view="day"
render()
}

async function loadCalendars(){

const r=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+token}}
)

const data=await r.json()

calendars=data.items

}

async function loadEvents(){

events=[]

let end=new Date(monday)
end.setDate(monday.getDate()+7)

for(const cal of calendars){

const r=await fetch(
`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${monday.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`,
{headers:{Authorization:"Bearer "+token}}
)

const data=await r.json()

if(data.items){

data.items.forEach(e=>{
e.calendar=cal.summary
e.color=cal.backgroundColor||"#5f6368"
events.push(e)
})

}

}

}

function renderFilters(){

const f=document.getElementById("filters")

f.innerHTML="<b>Agenda's</b><br>"

calendars.forEach(cal=>{

const id="f"+cal.id.replace(/[^a-z0-9]/gi,"")

f.innerHTML+=`
<label>
<input type="checkbox" id="${id}" checked onchange="render()">
${cal.summary}
</label>
`

})

}

function selectedCalendars(){

return calendars.filter(cal=>{

const id="f"+cal.id.replace(/[^a-z0-9]/gi,"")

return document.getElementById(id)?.checked

}).map(c=>c.summary)

}

function selectAll(){
document.querySelectorAll("#filters input").forEach(i=>i.checked=true)
render()
}

function selectNone(){
document.querySelectorAll("#filters input").forEach(i=>i.checked=false)
render()
}

function render(){

const cal=document.getElementById("calendar")

cal.innerHTML=""

const days=view==="week"?7:1

cal.style.gridTemplateColumns=view==="week"?"repeat(7,1fr)":"1fr"

const names=["Ma","Di","Wo","Do","Vr","Za","Zo"]

for(let i=0;i<days;i++){

let d=new Date(monday)
d.setDate(monday.getDate()+i)

const day=document.createElement("div")
day.className="day"

day.innerHTML=`<div class="dayTitle">${names[i]} ${d.getDate()}/${d.getMonth()+1}</div>`

const timeline=document.createElement("div")
timeline.className="timeline"

for(let h=6;h<=23;h++){

const hour=document.createElement("div")
hour.className="hour"
hour.innerText=h+":00"

timeline.appendChild(hour)

}

day.appendChild(timeline)

cal.appendChild(day)

renderEvents(day,i)

}

}

function renderEvents(day,index){

const selected=selectedCalendars()

const dayEvents=events
.filter(e=>{
if(!selected.includes(e.calendar)) return false
const d=new Date(e.start.dateTime||e.start.date)
return (d.getDay()+6)%7===index
})
.sort((a,b)=>new Date(a.start.dateTime||a.start.date)-new Date(b.start.dateTime||b.start.date))

const lanes=[]

dayEvents.forEach(e=>{

const start=new Date(e.start.dateTime||e.start.date)
const end=new Date(e.end?.dateTime||e.start.dateTime||e.start.date)

const startMin=start.getHours()*60+start.getMinutes()
const endMin=end.getHours()*60+end.getMinutes()

let lane=0
while(lanes[lane] && lanes[lane]>startMin) lane++

lanes[lane]=endMin

const dayStart=6*60
const dayEnd=23*60
const duration=dayEnd-dayStart

const top=(startMin-dayStart)/duration*100
const height=(endMin-startMin)/duration*100
const width=100/(lanes.length+1)

const div=document.createElement("div")
div.className="event"

div.style.top=top+"%"
div.style.height=height+"%"
div.style.left=(lane*width)+"%"
div.style.width=width+"%"
div.style.background=colorAI(e)

const icon=getIcon(e)

div.innerHTML=`
<img src="https://api.iconify.design/mdi/${icon}.svg?color=white">
<div>${e.summary}</div>
`

enableDrag(div)

day.appendChild(div)

})

}

function enableDrag(el){

el.draggable=true

el.addEventListener("dragstart",e=>{
e.dataTransfer.setData("text/plain","drag")
})

}

function colorAI(e){

const t=(e.summary||"").toLowerCase()

if(t.includes("school")) return "#34A853"
if(t.includes("voetbal")) return "#EA4335"
if(t.includes("zwem")) return "#00ACC1"
if(t.includes("dokter")) return "#DB4437"
if(t.includes("eten")) return "#FBBC05"
if(t.includes("slapen")) return "#5C6BC0"

return e.color

}

function getIcon(e){

const t=(e.summary||"").toLowerCase()
const l=(e.location||"").toLowerCase()

if(t.includes("bus")) return "bus"
if(t.includes("slapen")) return "sleep"
if(t.includes("rijden")) return "car"
if(t.includes("voetbal")) return "soccer"
if(t.includes("zwem")) return "swim"
if(t.includes("school")) return "school"
if(t.includes("verjaardag")) return "cake"
if(t.includes("feest")) return "party-popper"
if(t.includes("dokter")) return "medical-bag"
if(t.includes("tandarts")) return "tooth"
if(t.includes("beugel")) return "tooth-outline"
if(t.includes("eten")) return "silverware"
if(t.includes("film")) return "movie-open"
if(t.includes("muziek")) return "music"
if(t.includes("oppas")) return "home-heart"

if(l.includes("kapelstraat 73")) return "medical-cross"
if(l.includes("puthofveld")) return "nurse"

return "calendar"

}

function toggleKid(){
document.body.classList.toggle("kid")
}

parseToken()

</script>

</body>
</html>
