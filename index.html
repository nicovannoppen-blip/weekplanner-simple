<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Familie Agenda PRO D</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f3f4;
}

header{
background:#4a7bd8;
color:white;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
align-items:center;
}

button{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

#filters{
padding:10px;
background:white;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
height:900px;
}

.day{
border-right:1px solid #ddd;
background:#fafafa;
position:relative;
}

.dayHeader{
background:#eee;
padding:6px;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.timeline{
position:absolute;
top:28px;
bottom:0;
left:0;
right:0;
}

.hour{
position:absolute;
left:0;
right:0;
border-top:1px solid #ddd;
font-size:10px;
color:#777;
}

.event{
position:absolute;
border-radius:6px;
color:white;
padding:3px;
font-size:12px;
cursor:move;
overflow:hidden;
}

.icon{
width:14px;
vertical-align:middle;
margin-right:4px;
}

@media print{
header,#filters{
display:none;
}
}

</style>
</head>

<body>

<header>

<b>Familie Agenda</b>

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<button onclick="prevWeek()">◀</button>
<button onclick="nextWeek()">▶</button>

<button onclick="weekView()">Week</button>
<button onclick="dayView()">Dag</button>

<button onclick="selectAll()">Alles</button>
<button onclick="selectNone()">Geen</button>

<button onclick="window.print()">Print</button>

</header>

<div id="filters"></div>
<div id="calendar"></div>

<script>

const CLIENT_ID="259423355709-81s2fclv800ps73gqm8vb7t4vkcvct81.apps.googleusercontent.com"

let token=null
let calendars=[]
let events=[]
let monday=null
let mode="week"

const START_HOUR=7
const END_HOUR=23

const HIDDEN=[
"Weeknummers",
"Agenda",
"Borgloon Weather",
"agenda website"
]

/* LOGIN */

function login(){

const url="https://accounts.google.com/o/oauth2/v2/auth"

const params={
client_id:CLIENT_ID,
redirect_uri:window.location.origin,
response_type:"token",
scope:"https://www.googleapis.com/auth/calendar.readonly"
}

location=url+"?"+new URLSearchParams(params)

}

function logout(){
location.hash=""
location.reload()
}

function parseToken(){

const hash=location.hash.substring(1)
const p=new URLSearchParams(hash)
token=p.get("access_token")

if(token)init()

}

/* INIT */

async function init(){

monday=getMonday(new Date())

await loadCalendars()
renderFilters()

await loadEvents()

render()

}

/* LOAD CALENDARS */

async function loadCalendars(){

const res=await fetch(
"https://www.googleapis.com/calendar/v3/users/me/calendarList",
{headers:{Authorization:"Bearer "+token}}
)

const data=await res.json()

calendars=data.items.filter(c=>!HIDDEN.includes(c.summary))

calendars.forEach(c=>{
if(c.summary.includes("Feestdagen"))
c.summary="feestdagen"
})

}

/* LOAD EVENTS */

async function loadEvents(){

events=[]

let end=new Date(monday)
end.setDate(end.getDate()+7)

for(const cal of calendars){

const res=await fetch(
`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events?timeMin=${monday.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`,
{headers:{Authorization:"Bearer "+token}}
)

const data=await res.json()

if(data.items){

data.items.forEach(e=>{
e.calendarName=cal.summary
e.color=cal.backgroundColor||"#666"
events.push(e)
})

}

}

}

/* FILTERS */

function renderFilters(){

const div=document.getElementById("filters")
div.innerHTML=""

calendars.forEach(c=>{

const id="f_"+c.id.replace(/\W/g,"")

div.innerHTML+=`
<label>
<input type="checkbox" checked id="${id}" onchange="render()">
${c.summary}
</label>
`

})

}

function selectedCalendars(){

return calendars.filter(c=>{
const id="f_"+c.id.replace(/\W/g,"")
return document.getElementById(id)?.checked
}).map(c=>c.summary)

}

function selectAll(){

document.querySelectorAll("#filters input")
.forEach(c=>c.checked=true)

render()

}

function selectNone(){

document.querySelectorAll("#filters input")
.forEach(c=>c.checked=false)

render()

}

/* NAVIGATION */

function nextWeek(){

monday.setDate(monday.getDate()+7)

loadEvents().then(render)

}

function prevWeek(){

monday.setDate(monday.getDate()-7)

loadEvents().then(render)

}

/* VIEW */

function weekView(){
mode="week"
render()
}

function dayView(){
mode="day"
render()
}

/* RENDER */

function render(){

const cal=document.getElementById("calendar")
cal.innerHTML=""

let days=(mode=="week")?7:1

for(let i=0;i<days;i++){

let d=new Date(monday)
d.setDate(monday.getDate()+i)

const day=document.createElement("div")
day.className="day"

day.innerHTML=`
<div class="dayHeader">${d.toLocaleDateString()}</div>
<div class="timeline"></div>
`

cal.appendChild(day)

drawHours(day)

drawEvents(day,d)

}

}

/* HOURS */

function drawHours(day){

const timeline=day.querySelector(".timeline")

for(let h=START_HOUR;h<=END_HOUR;h++){

const pos=(h-START_HOUR)/(END_HOUR-START_HOUR)*100

const line=document.createElement("div")
line.className="hour"
line.style.top=pos+"%"
line.innerText=h+":00"

timeline.appendChild(line)

}

}

/* EVENTS */

function drawEvents(day,date){

const timeline=day.querySelector(".timeline")

const selected=selectedCalendars()

const dayEvents=events
.filter(e=>selected.includes(e.calendarName))
.filter(e=>{
const d=new Date(e.start.dateTime||e.start.date)
return d.toDateString()==date.toDateString()
})
.sort((a,b)=>new Date(a.start.dateTime||a.start.date)-new Date(b.start.dateTime||b.start.date))

let columns=[]

dayEvents.forEach(e=>{

const start=new Date(e.start.dateTime||e.start.date)
const end=new Date(e.end?.dateTime||e.end?.date||start)

const startMin=start.getHours()*60+start.getMinutes()
const endMin=end.getHours()*60+end.getMinutes()

const top=(startMin-START_HOUR*60)/((END_HOUR-START_HOUR)*60)*100
const height=(endMin-startMin)/((END_HOUR-START_HOUR)*60)*100

let col=0

while(columns[col] && columns[col]>startMin) col++

columns[col]=endMin

const width=90/(col+1)
const left=5+col*width

const div=document.createElement("div")

div.className="event"
div.style.background=e.color
div.style.top=top+"%"
div.style.height=height+"%"
div.style.left=left+"%"
div.style.width=width+"%"

div.draggable=true

div.innerHTML=`
<img class="icon" src="${getIcon(e)}">
${e.summary}
`

enableDrag(div)

timeline.appendChild(div)

})

}

/* DRAG */

function enableDrag(el){

el.addEventListener("dragstart",e=>{
e.dataTransfer.setData("text","move")
})

el.addEventListener("dragend",e=>{
el.style.top=e.pageY-200+"px"
})

}

/* ICONS */

function getIcon(e){

const t=(e.summary||"").toLowerCase()
const loc=(e.location||"").toLowerCase()

if(t.includes("bus")) return "https://api.iconify.design/mdi/bus.svg"

if(t.includes("slapen")) return "https://api.iconify.design/mdi/sleep.svg"

if(t.includes("rijden")) return "https://api.iconify.design/mdi/car.svg"

if(t.includes("beugel")) return "https://api.iconify.design/mdi/tooth-outline.svg"

if(t.includes("rita oppas thuis")||t.includes("oppas door loriana"))
return "https://api.iconify.design/mdi/home-heart.svg"

if(t.includes("rita oppas bij haar"))
return "https://api.iconify.design/mdi/home-export-outline.svg"

if(loc.includes("orelia puthof"))
return "https://api.iconify.design/mdi/nurse.svg"

return "https://api.iconify.design/mdi/calendar.svg"

}

/* DATE */

function getMonday(d){

const date=new Date(d)

const day=date.getDay()||7
if(day!==1) date.setHours(-24*(day-1))

return date

}

parseToken()

</script>

</body>
</html>
