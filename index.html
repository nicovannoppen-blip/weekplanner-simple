<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AgendaPicto</title>

<style>
body { font-family: Arial; margin:0; background:#f1f3f4;}
header { background:#4285F4; color:white; padding:15px;}
button { padding:8px 14px; margin:5px; border:none; background:#4285F4; color:white; border-radius:4px; cursor:pointer;}
#calendar { padding:15px;}
.event { background:white; padding:10px; margin-bottom:8px; border-radius:6px; display:flex; gap:10px; align-items:center;}
.icon { width:48px; height:48px;}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>
<body>

<header>
AgendaPicto
<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<span id="userInfo"></span>
</header>

<div id="calendar"></div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDxhqddHdXDEWw3SfDnYKOeKW9_ejse1_c",
  authDomain: "weekplanner-pro-b16d8.firebaseapp.com",
  projectId: "weekplanner-pro-b16d8"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔥 GOOGLE PROVIDER
const provider = new firebase.auth.GoogleAuthProvider();
provider.addScope("https://www.googleapis.com/auth/calendar.readonly");

// 🔥 LOGIN (redirect, geen popup)
document.getElementById("loginBtn").onclick = () => {
  auth.signInWithRedirect(provider);
};

// 🔥 LOGOUT
document.getElementById("logoutBtn").onclick = () => {
  auth.signOut();
};

// 🔥 RESULT NA REDIRECT
auth.getRedirectResult().then(result => {
  if (result.credential) {
    console.log("Ingelogd!");
  }
}).catch(error => {
  console.error(error);
});

// 🔥 STATE LISTENER
auth.onAuthStateChanged(async user => {
  if (user) {
    document.getElementById("userInfo").innerText = "Welkom " + user.displayName;
    const token = (await user.getIdTokenResult()).token;
    loadCalendar(token);
  } else {
    document.getElementById("userInfo").innerText = "";
    document.getElementById("calendar").innerHTML = "";
  }
});

// 🔥 GOOGLE CALENDAR
async function loadCalendar(token) {
  const res = await fetch(
    "https://www.googleapis.com/calendar/v3/calendars/primary/events",
    { headers:{ Authorization:"Bearer "+token } }
  );

  const data = await res.json();
  renderEvents(data.items || []);
}

function renderEvents(events) {
  const container = document.getElementById("calendar");
  container.innerHTML = "";

  events.forEach(e=>{
    const div = document.createElement("div");
    div.className="event";
    div.innerHTML = `
      <img class="icon" src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
      <div>
        <strong>${e.summary}</strong><br>
        ${e.start?.dateTime || e.start?.date}
      </div>
    `;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
