<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getAuth, 
    GoogleAuthProvider, 
    signInWithPopup, 
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    query,
    where
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDxhqddHdXDEWw3SfDnYKOeKW9_ejse1_c",
    authDomain: "weekplanner-pro-b16d8.firebaseapp.com",
    projectId: "weekplanner-pro-b16d8",
    storageBucket: "weekplanner-pro-b16d8.firebasestorage.app",
    messagingSenderId: "838954104666",
    appId: "1:838954104666:web:02d663508cad4c073f6563",
    measurementId: "G-0EKD9MXP8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const appDiv = document.getElementById("app");

  const children = [
    { name: "Kind 1", color: "#FF6B6B" },
    { name: "Kind 2", color: "#4D96FF" },
    { name: "Kind 3", color: "#6BCB77" },
    { name: "Kind 4", color: "#FFD93D" },
    { name: "Kind 5", color: "#B980F0" }
  ];

  function showLogin() {
    appDiv.innerHTML = `
      <div class="login-screen">
        <h1>Weekplanner</h1>
        <button onclick="login()">Inloggen met Google</button>
      </div>
    `;
  }

  window.login = async function() {
    await signInWithPopup(auth, provider);
  };

  window.logout = async function() {
    await signOut(auth);
  };

  async function addActivity(user, childName) {
    const text = prompt("Nieuwe activiteit:");
    if (!text) return;

    await addDoc(collection(db, "activities"), {
      userId: user.uid,
      child: childName,
      text: text
    });

    loadActivities(user);
  }

  async function loadActivities(user) {
    const q = query(
      collection(db, "activities"),
      where("userId", "==", user.uid)
    );

    const snapshot = await getDocs(q);

    const activities = {};
    snapshot.forEach(doc => {
      const data = doc.data();
      if (!activities[data.child]) {
        activities[data.child] = [];
      }
      activities[data.child].push(data.text);
    });

    renderPlanner(user, activities);
  }

  function renderPlanner(user, activities = {}) {
    appDiv.innerHTML = `
      <header>Welkom ${user.displayName}</header>
      <div class="container">
        <button onclick="logout()">Uitloggen</button>
        <button onclick="window.print()">Print</button>
        <div class="grid">
          ${children.map(child => `
            <div class="card" style="background:${child.color}">
              ${child.name}<br><br>
              ${(activities[child.name] || [])
                .map(a => `<div>• ${a}</div>`)
                .join("")}
              <br>
              <button onclick="add('${child.name}')">+ Toevoegen</button>
            </div>
          `).join("")}
        </div>
      </div>
    `;

    window.add = (childName) => addActivity(user, childName);
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      loadActivities(user);
    } else {
      showLogin();
    }
  });
</script>
