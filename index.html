<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AgendaPicto PRO Z ULTRA</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="login">

<h1>AgendaPicto</h1>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<label>
<input type="checkbox" id="remember">
Onthoud aanmelden
</label>

<button onclick="login()">Aanmelden</button>

</div>

<div id="app">

<header>

<h1>AgendaPicto</h1>

<div class="controls">

<button onclick="setView('week')">Week</button>
<button onclick="setView('day')">Dag</button>

<button onclick="toggleBigIcons()">Grote picto’s</button>

<button onclick="selectAll()">Alles</button>
<button onclick="deselectAll()">Geen</button>

</div>

<div id="filters"></div>

</header>

<div id="calendar"></div>

</div>

<script src="app.js"></script>

</body>
</html>
